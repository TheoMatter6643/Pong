<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Classic Pong</title>
    <style>
        /* Prevent scrolling and zooming on mobile/iPad */
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
            font-family: sans-serif;
            touch-action: none;
        }

        /* Center and scale the canvas while maintaining aspect ratio */
        #gameCanvas {
            display: block;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            max-width: 100%;
            max-height: 100%;
            box-sizing: border-box;
            border: 2px solid #fff;
        }
    </style>
</head>
<body>

    <canvas id="gameCanvas" width="800" height="500"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // Game Configuration & State
        const WINNING_SCORE = 7;
        let gameState = 'START'; // START, PLAYING, GAME_OVER

        // Paddle Configuration
        const PADDLE_WIDTH = 15;
        const PADDLE_HEIGHT = 90;
        
        const player = {
            x: 20,
            y: canvas.height / 2 - PADDLE_HEIGHT / 2,
            score: 0
        };

        const ai = {
            x: canvas.width - 20 - PADDLE_WIDTH,
            y: canvas.height / 2 - PADDLE_HEIGHT / 2,
            score: 0,
            speed: 4.5 // Controls AI reaction limits
        };

        // Ball Configuration
        const BALL_SIZE = 12;
        const INITIAL_BALL_SPEED = 5;
        const SPEED_INCREMENT = 0.5;

        const ball = {
            x: canvas.width / 2,
            y: canvas.height / 2,
            vx: INITIAL_BALL_SPEED,
            vy: INITIAL_BALL_SPEED,
            size: BALL_SIZE
        };

        // Reset Ball to Center
        function resetBall(direction) {
            ball.x = canvas.width / 2;
            ball.y = canvas.height / 2;
            ball.vx = direction * INITIAL_BALL_SPEED;
            // Randomize vertical direction slightly
            ball.vy = (Math.random() > 0.5 ? 1 : -1) * (INITIAL_BALL_SPEED * (0.7 + Math.random() * 0.5));
        }

        // Reset Full Game State
        function resetGame() {
            player.score = 0;
            ai.score = 0;
            player.y = canvas.height / 2 - PADDLE_HEIGHT / 2;
            ai.y = canvas.height / 2 - PADDLE_HEIGHT / 2;
            resetBall(Math.random() > 0.5 ? 1 : -1);
        }

        // --- Controls Handling (iPad Touch + Desktop Mouse) ---
        
        function handlePointer(clientY) {
            // Calculate canvas scaling factor if resized on screen
            const rect = canvas.getBoundingClientRect();
            const scaleY = canvas.height / rect.height;
            
            // Extract position relative to canvas and center the paddle on pointer
            const relativeY = (clientY - rect.top) * scaleY;
            player.y = relativeY - PADDLE_HEIGHT / 2;

            // Keep paddle within canvas bounds
            if (player.y < 0) player.y = 0;
            if (player.y > canvas.height - PADDLE_HEIGHT) player.y = canvas.height - PADDLE_HEIGHT;
        }

        // Mouse Move Event
        window.addEventListener('mousemove', (e) => {
            if (gameState === 'PLAYING') {
                handlePointer(e.clientY);
            }
        });

        // Touch Move Event (Optimized for iPad Safari)
        window.addEventListener('touchmove', (e) => {
            if (gameState === 'PLAYING' && e.touches.length > 0) {
                const touch = e.touches[0];
                // Only capture touches on the left half of the screen for the player
                const rect = canvas.getBoundingClientRect();
                if (touch.clientX < rect.left + rect.width / 2) {
                    handlePointer(touch.clientY);
                }
            }
            e.preventDefault(); // Prevent accidental pull-to-refresh or scrolling
        }, { passive: false });

        // Screen Interaction for Scene Changes
        function handleInteraction() {
            if (gameState === 'START') {
                resetGame();
                gameState = 'PLAYING';
            } else if (gameState === 'GAME_OVER') {
                gameState = 'START';
            }
        }

        window.addEventListener('click', handleInteraction);
        window.addEventListener('touchstart', (e) => {
            handleInteraction();
            e.preventDefault();
        }, { passive: false });


        // --- Game Logic Updates ---
        
        function update() {
            if (gameState !== 'PLAYING') return;

            // Move Ball
            ball.x += ball.vx;
            ball.y += ball.vy;

            // AI Logic (Medium Difficulty: Follows ball with interpolation lag/speed limit)
            const aiTargetY = ball.y - PADDLE_HEIGHT / 2;
            const aiDiff = aiTargetY - ai.y;
            
            // Limit AI movement speed to make it beatable
            if (aiDiff > 0) {
                ai.y += Math.min(aiDiff, ai.speed);
            } else {
                ai.y += Math.max(aiDiff, -ai.speed);
            }

            // Keep AI within bounds
            if (ai.y < 0) ai.y = 0;
            if (ai.y > canvas.height - PADDLE_HEIGHT) ai.y = canvas.height - PADDLE_HEIGHT;

            // Top and Bottom Wall Collisions
            if (ball.y <= 0) {
                ball.y = 0;
                ball.vy = -ball.vy;
            } else if (ball.y >= canvas.height - ball.size) {
                ball.y = canvas.height - ball.size;
                ball.vy = -ball.vy;
            }

            // Player Paddle Collision Check
            if (ball.vx < 0 && ball.x <= player.x + PADDLE_WIDTH && ball.x + ball.vx >= player.x) {
                if (ball.y + ball.size >= player.y && ball.y <= player.y + PADDLE_HEIGHT) {
                    // Calculate hit point impact on vertical velocity
                    const relativeIntersectY = (player.y + (PADDLE_HEIGHT / 2)) - ball.y;
                    const normalizedIntersectY = relativeIntersectY / (PADDLE_HEIGHT / 2);
                    
                    // Reverse horizontal direction and accelerate
                    ball.vx = -ball.vx + SPEED_INCREMENT;
                    ball.vy = -normalizedIntersectY * 6;
                    ball.x = player.x + PADDLE_WIDTH; // Snap out of paddle
                }
            }

            // AI Paddle Collision Check
            if (ball.vx > 0 && ball.x + ball.size >= ai.x && ball.x + ball.vx <= ai.x + PADDLE_WIDTH) {
                if (ball.y + ball.size >= ai.y && ball.y <= ai.y + PADDLE_HEIGHT) {
                    const relativeIntersectY = (ai.y + (PADDLE_HEIGHT / 2)) - ball.y;
                    const normalizedIntersectY = relativeIntersectY / (PADDLE_HEIGHT / 2);

                    ball.vx = -(ball.vx + SPEED_INCREMENT);
                    ball.vy = -normalizedIntersectY * 6;
                    ball.x = ai.x - ball.size; // Snap out of paddle
                }
            }

            // Scoring Conditions
            if (ball.x < 0) {
                ai.score++;
                if (ai.score >= WINNING_SCORE) {
                    gameState = 'GAME_OVER';
                } else {
                    resetBall(1); // Serve to AI
                }
            } else if (ball.x > canvas.width) {
                player.score++;
                if (player.score >= WINNING_SCORE) {
                    gameState = 'GAME_OVER';
                } else {
                    resetBall(-1); // Serve to Player
                }
            }
        }

        // --- Rendering Code ---
        
        function drawDashedLine() {
            ctx.strokeStyle = '#fff';
            ctx.lineWidth = 4;
            ctx.setLineDash([15, 15]);
            ctx.beginPath();
            ctx.moveTo(canvas.width / 2, 0);
            ctx.lineTo(canvas.width / 2, canvas.height);
            ctx.stroke();
            ctx.setLineDash([]); // Reset to solid line formatting
        }

        function draw() {
            // Clear Screen
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            if (gameState === 'START') {
                ctx.fillStyle = '#fff';
                ctx.textAlign = 'center';
                
                ctx.font = 'bold 36px sans-serif';
                ctx.fillText('CLASSIC PONG', canvas.width / 2, canvas.height / 2 - 40);
                
                ctx.font = '18px sans-serif';
                ctx.fillText('Drag left screen or move mouse to control paddle.', canvas.width / 2, canvas.height / 2 + 10);
                ctx.fillText('First to 7 wins.', canvas.width / 2, canvas.height / 2 + 40);
                ctx.fillText('Tap or Click anywhere to Start', canvas.width / 2, canvas.height / 2 + 90);
                return;
            }

            // Draw Background Field Marks
            drawDashedLine();

            // Draw Paddles
            ctx.fillStyle = '#fff';
            ctx.fillRect(player.x, player.y, PADDLE_WIDTH, PADDLE_HEIGHT);
            ctx.fillRect(ai.x, ai.y, PADDLE_WIDTH, PADDLE_HEIGHT);

            // Draw Ball
            ctx.fillRect(ball.x, ball.y, ball.size, ball.size);

            // Draw Scoreboard
            ctx.font = 'bold 48px sans-serif';
            ctx.textAlign = 'center';
            ctx.fillText(player.score, canvas.width / 4, 60);
            ctx.fillText(ai.score, (canvas.width / 4) * 3, 60);

            if (gameState === 'GAME_OVER') {
                ctx.fillStyle = 'rgba(0, 0, 0, 0.85)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);

                ctx.fillStyle = '#fff';
                ctx.font = 'bold 40px sans-serif';
                const winnerText = player.score >= WINNING_SCORE ? 'YOU WIN!' : 'AI WINS!';
                ctx.fillText(winnerText, canvas.width / 2, canvas.height / 2 - 20);

                ctx.font = '18px sans-serif';
                ctx.fillText('Tap or Click to return to menu', canvas.width / 2, canvas.height / 2 + 30);
            }
        }

        // --- Main System Loop ---
        function loop() {
            update();
            draw();
            requestAnimationFrame(loop);
        }

        // Initialize Loop Execution
        loop();
    </script>
</body>
</html>
