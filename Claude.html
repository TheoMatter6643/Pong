<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Pong</title>
<style>
  /* Reset and lock the page so it behaves like a fullscreen app on iPad */
  html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    background: #000;
    overflow: hidden;
    touch-action: none; /* prevent scrolling/zooming gestures while playing */
    -webkit-user-select: none;
    user-select: none;
  }

  #gameCanvas {
    display: block;
    background: #000;
    width: 100vw;
    height: 100vh;
  }

  /* Simple overlay for messages like "Tap to Start" / Win screen */
  #overlay {
    position: fixed;
    top: 0; left: 0;
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: #fff;
    font-family: -apple-system, Helvetica, Arial, sans-serif;
    text-align: center;
    background: rgba(0,0,0,0.6);
    pointer-events: none;
  }
  #overlay.hidden { display: none; }
  #overlay h1 { font-size: 8vw; margin: 0 0 1vh 0; letter-spacing: 0.1em; }
  #overlay p { font-size: 4vw; margin: 0; opacity: 0.85; }
</style>
</head>
<body>

<canvas id="gameCanvas"></canvas>

<div id="overlay">
  <h1 id="overlayTitle">PONG</h1>
  <p id="overlaySub">Tap or click to start</p>
</div>

<script>
(function () {
  "use strict";

  // ---------------------------------------------------------------------
  // Canvas setup
  // ---------------------------------------------------------------------
  const canvas = document.getElementById('gameCanvas');
  const ctx = canvas.getContext('2d');
  const overlay = document.getElementById('overlay');
  const overlayTitle = document.getElementById('overlayTitle');
  const overlaySub = document.getElementById('overlaySub');

  // Logical game dimensions stay fixed; canvas is scaled to fit any screen.
  // This keeps physics consistent regardless of device resolution.
  const WORLD_WIDTH = 800;
  const WORLD_HEIGHT = 500;

  let scale = 1;        // pixels-per-world-unit, used to map touch/mouse coords
  let offsetX = 0;       // letterbox offsets if aspect ratios don't match
  let offsetY = 0;

  // Resize the canvas to fill the screen (accounting for device pixel ratio
  // so lines stay crisp on iPad's high-DPI Retina display).
  function resizeCanvas() {
    const dpr = window.devicePixelRatio || 1;
    const cssWidth = window.innerWidth;
    const cssHeight = window.innerHeight;

    canvas.style.width = cssWidth + 'px';
    canvas.style.height = cssHeight + 'px';
    canvas.width = Math.floor(cssWidth * dpr);
    canvas.height = Math.floor(cssHeight * dpr);

    // Compute uniform scale to fit WORLD_WIDTH x WORLD_HEIGHT inside the
    // actual screen while preserving aspect ratio (letterboxing if needed).
    const scaleX = cssWidth / WORLD_WIDTH;
    const scaleY = cssHeight / WORLD_HEIGHT;
    scale = Math.min(scaleX, scaleY);

    offsetX = (cssWidth - WORLD_WIDTH * scale) / 2;
    offsetY = (cssHeight - WORLD_HEIGHT * scale) / 2;

    // Apply DPR + letterbox + game-scale transform in one go.
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    ctx.translate(offsetX, offsetY);
    ctx.scale(scale, scale);
  }

  window.addEventListener('resize', resizeCanvas);
  window.addEventListener('orientationchange', resizeCanvas);

  // ---------------------------------------------------------------------
  // Game constants
  // ---------------------------------------------------------------------
  const PADDLE_WIDTH = 14;
  const PADDLE_HEIGHT = 90;
  const PADDLE_MARGIN = 24;        // distance from screen edge
  const BALL_RADIUS = 8;
  const WIN_SCORE = 7;

  const BASE_BALL_SPEED = 280;     // world units per second
  const SPEED_INCREASE = 1.06;     // multiplier applied on each paddle hit
  const MAX_BALL_SPEED = 760;

  const PLAYER_PADDLE_SPEED = 900; // max speed paddle can move (units/sec) - for smoothing
  const AI_REACTION_DELAY = 0.12;  // seconds of simulated "reaction lag"
  const AI_MAX_SPEED = 420;        // AI paddle max speed (slower than perfect tracking)
  const AI_ERROR_MARGIN = 18;      // dead zone so AI doesn't twitch endlessly

  // ---------------------------------------------------------------------
  // Game state
  // ---------------------------------------------------------------------
  const state = {
    playerY: WORLD_HEIGHT / 2 - PADDLE_HEIGHT / 2,
    aiY: WORLD_HEIGHT / 2 - PADDLE_HEIGHT / 2,
    targetPlayerY: WORLD_HEIGHT / 2 - PADDLE_HEIGHT / 2, // where finger/mouse wants paddle
    ball: {
      x: WORLD_WIDTH / 2,
      y: WORLD_HEIGHT / 2,
      vx: 0,
      vy: 0,
      speed: BASE_BALL_SPEED
    },
    aiTrackedY: WORLD_HEIGHT / 2, // delayed estimate of ball position the AI reacts to
    aiDelayTimer: 0,
    playerScore: 0,
    aiScore: 0,
    running: false,       // true once a rally is in play
    gameOver: false,
    lastTime: null
  };

  // ---------------------------------------------------------------------
  // Helpers
  // ---------------------------------------------------------------------
  function clamp(value, min, max) {
    return Math.max(min, Math.min(max, value));
  }

  // Launch the ball from the center toward a given side (-1 = left, 1 = right)
  // with a randomized vertical angle so rallies vary.
  function serveBall(direction) {
    const ball = state.ball;
    ball.x = WORLD_WIDTH / 2;
    ball.y = WORLD_HEIGHT / 2;
    ball.speed = BASE_BALL_SPEED;

    // Random angle between -35 and 35 degrees from horizontal
    const maxAngle = Math.PI * (35 / 180);
    const angle = (Math.random() * 2 - 1) * maxAngle;

    ball.vx = Math.cos(angle) * ball.speed * direction;
    ball.vy = Math.sin(angle) * ball.speed;

    state.aiTrackedY = ball.y;
    state.aiDelayTimer = 0;
  }

  function resetMatch() {
    state.playerScore = 0;
    state.aiScore = 0;
    state.gameOver = false;
    state.playerY = WORLD_HEIGHT / 2 - PADDLE_HEIGHT / 2;
    state.aiY = WORLD_HEIGHT / 2 - PADDLE_HEIGHT / 2;
    state.targetPlayerY = state.playerY;
    serveBall(Math.random() < 0.5 ? -1 : 1);
    state.running = false; // wait for tap/click to begin
    showOverlay('PONG', 'Tap or click to start');
  }

  function showOverlay(title, sub) {
    overlayTitle.textContent = title;
    overlaySub.textContent = sub;
    overlay.classList.remove('hidden');
  }

  function hideOverlay() {
    overlay.classList.add('hidden');
  }

  // ---------------------------------------------------------------------
  // Input handling — works for touch (iPad) and mouse (desktop)
  // ---------------------------------------------------------------------

  // Convert a raw screen coordinate (clientX/clientY) into world-space Y.
  function screenToWorldY(clientY) {
    return (clientY - offsetY) / scale;
  }
  function screenToWorldX(clientX) {
    return (clientX - offsetX) / scale;
  }

  function handlePointerMove(clientX, clientY) {
    // Only respond to input on the left half of the screen, per spec,
    // so the player can't "cheat" by dragging on the AI's side.
    const worldX = screenToWorldX(clientX);
    if (worldX <= WORLD_WIDTH / 2) {
      const worldY = screenToWorldY(clientY);
      state.targetPlayerY = clamp(worldY - PADDLE_HEIGHT / 2, 0, WORLD_HEIGHT - PADDLE_HEIGHT);
    }
  }

  function startGameIfNeeded() {
    if (!state.running && !state.gameOver) {
      state.running = true;
      hideOverlay();
    } else if (state.gameOver) {
      resetMatch();
      state.running = true;
      hideOverlay();
    }
  }

  // Touch events (iPad Safari)
  canvas.addEventListener('touchstart', function (e) {
    e.preventDefault();
    startGameIfNeeded();
    const touch = e.touches[0];
    if (touch) handlePointerMove(touch.clientX, touch.clientY);
  }, { passive: false });

  canvas.addEventListener('touchmove', function (e) {
    e.preventDefault();
    const touch = e.touches[0];
    if (touch) handlePointerMove(touch.clientX, touch.clientY);
  }, { passive: false });

  // Mouse events (desktop)
  canvas.addEventListener('mousedown', function () {
    startGameIfNeeded();
  });

  canvas.addEventListener('mousemove', function (e) {
    handlePointerMove(e.clientX, e.clientY);
  });

  // Also allow tapping the overlay itself to start
  overlay.addEventListener('touchstart', function (e) {
    e.preventDefault();
    startGameIfNeeded();
  }, { passive: false });
  overlay.style.pointerEvents = 'auto';
  overlay.addEventListener('click', startGameIfNeeded);

  // ---------------------------------------------------------------------
  // AI logic — medium difficulty
  // ---------------------------------------------------------------------
  // The AI doesn't track the ball perfectly. It:
  //   1) Updates its "known" ball position only periodically (reaction delay)
  //   2) Moves toward that position at a capped speed (can't snap instantly)
  //   3) Has a small dead-zone so it doesn't jitter when already aligned
  function updateAI(dt) {
    const ball = state.ball;

    // Simulate reaction lag: AI's perceived ball position updates on a timer
    state.aiDelayTimer += dt;
    if (state.aiDelayTimer >= AI_REACTION_DELAY) {
      state.aiDelayTimer = 0;
      state.aiTrackedY = ball.y;
    }

    // Only actively chase the ball when it's heading toward the AI,
    // otherwise drift back toward center (more human-like behavior).
    let desiredCenter;
    if (ball.vx > 0) {
      desiredCenter = state.aiTrackedY;
    } else {
      desiredCenter = WORLD_HEIGHT / 2;
    }

    const paddleCenter = state.aiY + PADDLE_HEIGHT / 2;
    const diff = desiredCenter - paddleCenter;

    if (Math.abs(diff) > AI_ERROR_MARGIN) {
      const direction = diff > 0 ? 1 : -1;
      const move = direction * AI_MAX_SPEED * dt;
      // Don't overshoot the target in a single step
      state.aiY += Math.abs(move) > Math.abs(diff) ? diff : move;
    }

    state.aiY = clamp(state.aiY, 0, WORLD_HEIGHT - PADDLE_HEIGHT);
  }

  // ---------------------------------------------------------------------
  // Player paddle smoothing
  // ---------------------------------------------------------------------
  // Move the visible paddle toward the finger/mouse target at a capped
  // speed so it feels responsive but doesn't teleport jarringly.
  function updatePlayerPaddle(dt) {
    const diff = state.targetPlayerY - state.playerY;
    const maxStep = PLAYER_PADDLE_SPEED * dt;
    if (Math.abs(diff) <= maxStep) {
      state.playerY = state.targetPlayerY;
    } else {
      state.playerY += Math.sign(diff) * maxStep;
    }
    state.playerY = clamp(state.playerY, 0, WORLD_HEIGHT - PADDLE_HEIGHT);
  }

  // ---------------------------------------------------------------------
  // Ball physics & collisions
  // ---------------------------------------------------------------------
  function updateBall(dt) {
    const ball = state.ball;

    ball.x += ball.vx * dt;
    ball.y += ball.vy * dt;

    // Bounce off top/bottom walls
    if (ball.y - BALL_RADIUS <= 0) {
      ball.y = BALL_RADIUS;
      ball.vy *= -1;
    } else if (ball.y + BALL_RADIUS >= WORLD_HEIGHT) {
      ball.y = WORLD_HEIGHT - BALL_RADIUS;
      ball.vy *= -1;
    }

    // Player paddle (left side) collision
    const playerPaddleX = PADDLE_MARGIN;
    if (
      ball.vx < 0 &&
      ball.x - BALL_RADIUS <= playerPaddleX + PADDLE_WIDTH &&
      ball.x - BALL_RADIUS >= playerPaddleX &&
      ball.y >= state.playerY &&
      ball.y <= state.playerY + PADDLE_HEIGHT
    ) {
      handlePaddleBounce(playerPaddleX + PADDLE_WIDTH, state.playerY, 1);
    }

    // AI paddle (right side) collision
    const aiPaddleX = WORLD_WIDTH - PADDLE_MARGIN - PADDLE_WIDTH;
    if (
      ball.vx > 0 &&
      ball.x + BALL_RADIUS >= aiPaddleX &&
      ball.x + BALL_RADIUS <= aiPaddleX + PADDLE_WIDTH &&
      ball.y >= state.aiY &&
      ball.y <= state.aiY + PADDLE_HEIGHT
    ) {
      handlePaddleBounce(aiPaddleX, state.aiY, -1);
    }

    // Scoring: ball passes left edge -> AI scores; passes right edge -> player scores
    if (ball.x < -BALL_RADIUS * 2) {
      state.aiScore++;
      onPointScored();
    } else if (ball.x > WORLD_WIDTH + BALL_RADIUS * 2) {
      state.playerScore++;
      onPointScored();
    }
  }

  // Reflect ball off a paddle, adding spin based on where it hit (like
  // classic Pong) and increasing speed slightly each hit.
  function handlePaddleBounce(paddleEdgeX, paddleY, newDirX) {
    const ball = state.ball;

    // Position ball exactly at the paddle edge to avoid sticking/double-hits
    ball.x = paddleEdgeX + (newDirX > 0 ? BALL_RADIUS : -BALL_RADIUS);

    // Where on the paddle did it hit? -1 (top) to 1 (bottom)
    const relativeIntersect = ((ball.y - paddleY) / PADDLE_HEIGHT) * 2 - 1;
    const bounceAngle = relativeIntersect * (Math.PI * 50 / 180); // up to 50 degrees

    ball.speed = Math.min(ball.speed * SPEED_INCREASE, MAX_BALL_SPEED);
    ball.vx = Math.cos(bounceAngle) * ball.speed * newDirX;
    ball.vy = Math.sin(bounceAngle) * ball.speed;
  }

  function onPointScored() {
    if (state.playerScore >= WIN_SCORE || state.aiScore >= WIN_SCORE) {
      state.gameOver = true;
      state.running = false;
      const playerWon = state.playerScore >= WIN_SCORE;
      showOverlay(
        playerWon ? 'You Win!' : 'AI Wins',
        'Tap or click to play again'
      );
    } else {
      // Serve toward whoever just got scored on
      const direction = (state.ball.x < 0) ? 1 : -1;
      serveBall(direction);
      state.running = false; // brief pause before next serve
      // Resume automatically after a short delay
      setTimeout(function () {
        if (!state.gameOver) state.running = true;
      }, 700);
    }
  }

  // ---------------------------------------------------------------------
  // Rendering
  // ---------------------------------------------------------------------
  function draw() {
    // Clear background
    ctx.fillStyle = '#000';
    ctx.fillRect(0, 0, WORLD_WIDTH, WORLD_HEIGHT);

    // Center dashed line
    ctx.strokeStyle = '#ffffff';
    ctx.lineWidth = 4;
    ctx.setLineDash([12, 14]);
    ctx.beginPath();
    ctx.moveTo(WORLD_WIDTH / 2, 0);
    ctx.lineTo(WORLD_WIDTH / 2, WORLD_HEIGHT);
    ctx.stroke();
    ctx.setLineDash([]); // reset dash for other shapes

    // Paddles
    ctx.fillStyle = '#ffffff';
    ctx.fillRect(PADDLE_MARGIN, state.playerY, PADDLE_WIDTH, PADDLE_HEIGHT);
    ctx.fillRect(
      WORLD_WIDTH - PADDLE_MARGIN - PADDLE_WIDTH,
      state.aiY,
      PADDLE_WIDTH,
      PADDLE_HEIGHT
    );

    // Ball
    ctx.beginPath();
    ctx.arc(state.ball.x, state.ball.y, BALL_RADIUS, 0, Math.PI * 2);
    ctx.fill();

    // Score
    ctx.font = 'bold 48px -apple-system, Helvetica, Arial, sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'top';
    ctx.fillText(state.playerScore, WORLD_WIDTH / 2 - 80, 24);
    ctx.fillText(state.aiScore, WORLD_WIDTH / 2 + 80, 24);
  }

  // ---------------------------------------------------------------------
  // Main loop
  // ---------------------------------------------------------------------
  function loop(timestamp) {
    if (state.lastTime === null) state.lastTime = timestamp;
    let dt = (timestamp - state.lastTime) / 1000; // seconds
    state.lastTime = timestamp;

    // Clamp dt to avoid huge jumps if tab was backgrounded
    dt = Math.min(dt, 1 / 30);

    if (state.running) {
      updatePlayerPaddle(dt);
      updateAI(dt);
      updateBall(dt);
    } else {
      // Still let the player paddle move during serve pause / pre-game,
      // so controls feel responsive immediately.
      updatePlayerPaddle(dt);
    }

    draw();
    requestAnimationFrame(loop);
  }

  // ---------------------------------------------------------------------
  // Init
  // ---------------------------------------------------------------------
  resizeCanvas();
  resetMatch();
  requestAnimationFrame(loop);
})();
</script>
</body>
</html>
