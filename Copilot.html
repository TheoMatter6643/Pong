<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Pong</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    background: #000;
    overflow: hidden;
    touch-action: none; /* Prevent scrolling on touch */
  }
  canvas {
    display: block;
    background: #000;
  }
</style>
</head>
<body>
<canvas id="game"></canvas>
<script>
// Basic setup
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');

let width = window.innerWidth;
let height = window.innerHeight;
canvas.width = width;
canvas.height = height;

// Game constants (scaled with screen size)
function scale(v) { return v * (Math.min(width, height) / 800); }

let paddleWidth, paddleHeight, ballSize;
let playerX, playerY, aiX, aiY;
let ballX, ballY, ballVX, ballVY;
let playerScore = 0;
let aiScore = 0;
const maxScore = 7;

let ballBaseSpeed;
let ballSpeed;
let ballSpeedIncrement;
let aiMaxSpeed;
let isRunning = true;
let waitingForRestart = false;

// Initialize sizes and positions based on current canvas size
function initDimensions() {
  paddleWidth = scale(16);
  paddleHeight = scale(120);
  ballSize = scale(14);

  playerX = scale(40);
  aiX = width - scale(40) - paddleWidth;

  playerY = (height - paddleHeight) / 2;
  aiY = (height - paddleHeight) / 2;

  ballBaseSpeed = scale(6);
  ballSpeed = ballBaseSpeed;
  ballSpeedIncrement = scale(0.4);
  aiMaxSpeed = scale(5);

  resetBall(Math.random() < 0.5 ? 1 : -1);
}

// Reset ball to center and send it toward a side
function resetBall(direction) {
  ballX = width / 2;
  ballY = height / 2;

  // Random angle but not too vertical
  let angle = (Math.random() * 0.6 - 0.3); // -0.3..0.3 radians
  ballSpeed = ballBaseSpeed;

  ballVX = Math.cos(angle) * ballSpeed * direction;
  ballVY = Math.sin(angle) * ballSpeed;
}

// Resize handler to keep game full-screen and rescale elements
function handleResize() {
  const oldWidth = width;
  const oldHeight = height;

  width = window.innerWidth;
  height = window.innerHeight;
  canvas.width = width;
  canvas.height = height;

  // Re-scale paddles and ball while preserving relative positions
  const oldMin = Math.min(oldWidth, oldHeight);
  const newMin = Math.min(width, height);
  const scaleFactor = newMin / (oldMin || newMin);

  paddleWidth *= scaleFactor;
  paddleHeight *= scaleFactor;
  ballSize *= scaleFactor;
  playerX = scale(40);
  aiX = width - scale(40) - paddleWidth;

  playerY *= scaleFactor;
  aiY *= scaleFactor;
  ballX *= (width / (oldWidth || width));
  ballY *= (height / (oldHeight || height));

  ballBaseSpeed *= scaleFactor;
  ballSpeed *= scaleFactor;
  ballSpeedIncrement *= scaleFactor;
  aiMaxSpeed *= scaleFactor;
}

window.addEventListener('resize', handleResize);

// Input handling
let targetPlayerY = null;

// Mouse movement for desktop
canvas.addEventListener('mousemove', (e) => {
  const rect = canvas.getBoundingClientRect();
  const x = e.clientX - rect.left;
  const y = e.clientY - rect.top;

  // Only respond if mouse is on left half (player side)
  if (x <= width / 2) {
    targetPlayerY = y - paddleHeight / 2;
  }
});

// Touch controls for iPad
canvas.addEventListener('touchstart', handleTouch, { passive: false });
canvas.addEventListener('touchmove', handleTouch, { passive: false });

function handleTouch(e) {
  e.preventDefault();
  const rect = canvas.getBoundingClientRect();
  for (let i = 0; i < e.touches.length; i++) {
    const t = e.touches[i];
    const x = t.clientX - rect.left;
    const y = t.clientY - rect.top;
    // Only use touches on left half for player paddle
    if (x <= width / 2) {
      targetPlayerY = y - paddleHeight / 2;
      break;
    }
  }

  // If game is over and waiting, any touch restarts
  if (waitingForRestart) {
    restartGame();
  }
}

// Simple click to restart after game over (desktop)
canvas.addEventListener('click', () => {
  if (waitingForRestart) restartGame();
});

// Restart entire match
function restartGame() {
  playerScore = 0;
  aiScore = 0;
  waitingForRestart = false;
  isRunning = true;
  initDimensions();
}

// AI movement: medium difficulty with delay and capped speed
function updateAI() {
  const ballCenterY = ballY;
  const paddleCenterY = aiY + paddleHeight / 2;

  // Only chase ball when it's moving toward AI
  if (ballVX > 0) {
    const diff = ballCenterY - paddleCenterY;
    // Add a "reaction delay" by moving only a fraction of the distance
    const move = Math.max(Math.min(diff * 0.15, aiMaxSpeed), -aiMaxSpeed);
    aiY += move;
  }

  // Clamp AI paddle inside screen
  if (aiY < 0) aiY = 0;
  if (aiY + paddleHeight > height) aiY = height - paddleHeight;
}

// Update player paddle smoothly toward target position
function updatePlayer() {
  if (targetPlayerY === null) return;
  const diff = targetPlayerY - playerY;
  // Smooth follow to avoid jitter
  playerY += diff * 0.4;

  // Clamp inside screen
  if (playerY < 0) playerY = 0;
  if (playerY + paddleHeight > height) playerY = height - paddleHeight;
}

// Ball physics and collisions
function updateBall() {
  ballX += ballVX;
  ballY += ballVY;

  // Top/bottom wall collision
  if (ballY - ballSize / 2 < 0) {
    ballY = ballSize / 2;
    ballVY *= -1;
  } else if (ballY + ballSize / 2 > height) {
    ballY = height - ballSize / 2;
    ballVY *= -1;
  }

  // Player paddle collision
  if (ballX - ballSize / 2 <= playerX + paddleWidth &&
      ballX - ballSize / 2 >= playerX &&
      ballY + ballSize / 2 >= playerY &&
      ballY - ballSize / 2 <= playerY + paddleHeight &&
      ballVX < 0) {

    ballX = playerX + paddleWidth + ballSize / 2;
    ballVX *= -1;

    // Add spin based on where it hits the paddle
    const hitPos = (ballY - (playerY + paddleHeight / 2)) / (paddleHeight / 2);
    ballVY = hitPos * ballSpeed;

    // Slightly increase speed after each paddle hit
    ballSpeed += ballSpeedIncrement;
    const angle = Math.atan2(ballVY, ballVX);
    ballVX = Math.cos(angle) * ballSpeed;
    ballVY = Math.sin(angle) * ballSpeed;
  }

  // AI paddle collision
  if (ballX + ballSize / 2 >= aiX &&
      ballX + ballSize / 2 <= aiX + paddleWidth &&
      ballY + ballSize / 2 >= aiY &&
      ballY - ballSize / 2 <= aiY + paddleHeight &&
      ballVX > 0) {

    ballX = aiX - ballSize / 2;
    ballVX *= -1;

    const hitPos = (ballY - (aiY + paddleHeight / 2)) / (paddleHeight / 2);
    ballVY = hitPos * ballSpeed;

    ballSpeed += ballSpeedIncrement;
    const angle = Math.atan2(ballVY, ballVX);
    ballVX = Math.cos(angle) * ballSpeed;
    ballVY = Math.sin(angle) * ballSpeed;
  }

  // Scoring
  if (ballX + ballSize / 2 < 0) {
    // AI scores
    aiScore++;
    checkGameOver();
    if (isRunning) resetBall(1);
  } else if (ballX - ballSize / 2 > width) {
    // Player scores
    playerScore++;
    checkGameOver();
    if (isRunning) resetBall(-1);
  }
}

// Check if someone reached maxScore
function checkGameOver() {
  if (playerScore >= maxScore || aiScore >= maxScore) {
    isRunning = false;
    waitingForRestart = true;
  }
}

// Drawing helpers
function drawCenterLine() {
  ctx.strokeStyle = '#fff';
  ctx.lineWidth = scale(4);
  const dashLength = scale(20);
  const gapLength = scale(20);
  let y = 0;
  while (y < height) {
    ctx.beginPath();
    ctx.moveTo(width / 2, y);
    ctx.lineTo(width / 2, Math.min(y + dashLength, height));
    ctx.stroke();
    y += dashLength + gapLength;
  }
}

function drawPaddles() {
  ctx.fillStyle = '#fff';
  ctx.fillRect(playerX, playerY, paddleWidth, paddleHeight);
  ctx.fillRect(aiX, aiY, paddleWidth, paddleHeight);
}

function drawBall() {
  ctx.fillStyle = '#fff';
  ctx.beginPath();
  ctx.arc(ballX, ballY, ballSize / 2, 0, Math.PI * 2);
  ctx.fill();
}

function drawScore() {
  ctx.fillStyle = '#fff';
  ctx.font = `${scale(40)}px sans-serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'top';
  ctx.fillText(playerScore, width * 0.25, scale(20));
  ctx.fillText(aiScore, width * 0.75, scale(20));
}

function drawGameOver() {
  ctx.fillStyle = '#fff';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';

  ctx.font = `${scale(50)}px sans-serif`;
  const winner = playerScore > aiScore ? 'You Win!' : 'You Lose';
  ctx.fillText(winner, width / 2, height / 2 - scale(40));

  ctx.font = `${scale(24)}px sans-serif`;
  ctx.fillText('Tap or click to play again', width / 2, height / 2 + scale(20));
}

// Main game loop
function loop() {
  ctx.clearRect(0, 0, width, height);

  drawCenterLine();
  drawPaddles();
  drawBall();
  drawScore();

  if (isRunning) {
    updatePlayer();
    updateAI();
    updateBall();
  } else if (waitingForRestart) {
    drawGameOver();
  }

  requestAnimationFrame(loop);
}

// Start game
initDimensions();
loop();
</script>
</body>
</html>
