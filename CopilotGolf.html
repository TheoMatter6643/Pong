<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Starlit Mini Golf</title>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />
<style>
  :root {
    --bg: #050816;
    --fg: #f5f5f7;
    --accent: #4fd1c5;
    --accent-soft: #234e52;
    --danger: #f56565;
    --sand: #f6e0a3;
    --water: #3182ce;
    --wall: #2d3748;
    --hole: #1a202c;
    --green: #1f9d55;
  }
  * {
    box-sizing: border-box;
    -webkit-tap-highlight-color: transparent;
  }
  html, body {
    margin: 0;
    padding: 0;
    background: radial-gradient(circle at top, #1a365d 0, #050816 55%, #02010a 100%);
    color: var(--fg);
    font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    height: 100%;
    overflow: hidden;
  }
  body {
    display: flex;
    align-items: stretch;
    justify-content: center;
  }
  .shell {
    display: flex;
    flex-direction: column;
    width: 100vw;
    height: 100vh;
    padding: 10px;
    gap: 8px;
  }
  .hud {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
    padding: 6px 10px;
    border-radius: 999px;
    background: rgba(10, 25, 47, 0.9);
    box-shadow: 0 0 0 1px rgba(148, 163, 184, 0.2), 0 18px 40px rgba(0, 0, 0, 0.6);
    backdrop-filter: blur(16px);
  }
  .hud-left, .hud-right {
    display: flex;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
  }
  .hud-pill {
    padding: 4px 10px;
    border-radius: 999px;
    background: rgba(15, 23, 42, 0.9);
    font-size: 12px;
    letter-spacing: 0.03em;
    text-transform: uppercase;
    color: #e2e8f0;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .hud-pill span.value {
    font-weight: 600;
    color: var(--accent);
  }
  .hud-title {
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: #cbd5f5;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .hud-title-dot {
    width: 8px;
    height: 8px;
    border-radius: 999px;
    background: radial-gradient(circle at 30% 30%, #f6e05e, #dd6b20);
    box-shadow: 0 0 12px rgba(246, 224, 94, 0.9);
  }
  .hud-btn {
    border: none;
    outline: none;
    border-radius: 999px;
    padding: 6px 12px;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    background: linear-gradient(135deg, #4fd1c5, #63b3ed);
    color: #0b1120;
    cursor: pointer;
    box-shadow: 0 10px 25px rgba(56, 189, 248, 0.4);
  }
  .hud-btn:active {
    transform: translateY(1px) scale(0.99);
    box-shadow: 0 6px 18px rgba(56, 189, 248, 0.35);
  }
  .hud-msg {
    font-size: 12px;
    color: #e2e8f0;
    opacity: 0.9;
    max-width: 50vw;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .canvas-wrap {
    flex: 1;
    border-radius: 18px;
    overflow: hidden;
    position: relative;
    background: radial-gradient(circle at 20% 0, #1a365d 0, #020617 55%, #02010a 100%);
    box-shadow: 0 24px 60px rgba(0, 0, 0, 0.8);
  }
  canvas {
    width: 100%;
    height: 100%;
    display: block;
    touch-action: none;
  }
  .hint {
    position: absolute;
    left: 50%;
    bottom: 10px;
    transform: translateX(-50%);
    padding: 4px 10px;
    border-radius: 999px;
    background: rgba(15, 23, 42, 0.85);
    color: #cbd5f5;
    font-size: 11px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    pointer-events: none;
  }
  .badge {
    padding: 2px 8px;
    border-radius: 999px;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    background: rgba(45, 212, 191, 0.12);
    color: #81e6d9;
  }
  @media (max-width: 640px) {
    .hud {
      border-radius: 14px;
      flex-wrap: wrap;
      justify-content: center;
    }
    .hud-msg {
      max-width: 100%;
      text-align: center;
    }
  }
</style>
</head>
<body>
<div class="shell">
  <div class="hud">
    <div class="hud-left">
      <div class="hud-title">
        <div class="hud-title-dot"></div>
        <span>Starlit Mini Golf</span>
        <span class="badge">Touch &amp; Drag to Shoot</span>
      </div>
      <div class="hud-pill">
        Hole <span class="value" id="holeIndex">1</span>/<span id="holeTotal">1</span>
      </div>
      <div class="hud-pill">
        Par <span class="value" id="parValue">3</span>
      </div>
      <div class="hud-pill">
        Strokes <span class="value" id="strokeValue">0</span>
      </div>
      <div class="hud-pill">
        Total <span class="value" id="totalStrokes">0</span>
      </div>
    </div>
    <div class="hud-right">
      <div class="hud-msg" id="statusMsg">Line up your shot, then drag away from the ball to set power.</div>
      <button class="hud-btn" id="resetBtn">Restart Course</button>
    </div>
  </div>
  <div class="canvas-wrap">
    <canvas id="game"></canvas>
    <div class="hint">Drag away from the ball • Release to shoot • Pinch zoom not required</div>
  </div>
</div>

<script>
(function () {
  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');

  const holeIndexEl = document.getElementById('holeIndex');
  const holeTotalEl = document.getElementById('holeTotal');
  const parValueEl = document.getElementById('parValue');
  const strokeValueEl = document.getElementById('strokeValue');
  const totalStrokesEl = document.getElementById('totalStrokes');
  const statusMsgEl = document.getElementById('statusMsg');
  const resetBtn = document.getElementById('resetBtn');

  let width = 0;
  let height = 0;
  let devicePixelRatio = window.devicePixelRatio || 1;

  function resize() {
    const rect = canvas.getBoundingClientRect();
    width = rect.width;
    height = rect.height;
    devicePixelRatio = window.devicePixelRatio || 1;
    canvas.width = width * devicePixelRatio;
    canvas.height = height * devicePixelRatio;
    ctx.setTransform(devicePixelRatio, 0, 0, devicePixelRatio, 0, 0);
  }

  window.addEventListener('resize', resize);
  resize();

  // Course definition
  const course = [
    {
      name: 'Soft Launch',
      par: 3,
      start: { x: 0.18, y: 0.75 },
      hole: { x: 0.82, y: 0.25, r: 0.018 },
      walls: [
        { x: 0.08, y: 0.12, w: 0.84, h: 0.02 },
        { x: 0.08, y: 0.86, w: 0.84, h: 0.02 },
        { x: 0.08, y: 0.12, w: 0.02, h: 0.76 },
        { x: 0.90, y: 0.12, w: 0.02, h: 0.76 },
        { x: 0.40, y: 0.40, w: 0.02, h: 0.30 }
      ],
      sand: [
        { x: 0.45, y: 0.55, w: 0.20, h: 0.18, friction: 0.90 }
      ],
      water: [],
      bumpers: [
        { x: 0.65, y: 0.35, r: 0.03, bounciness: 1.15 }
      ],
      movers: []
    },
    {
      name: 'River Bend',
      par: 4,
      start: { x: 0.20, y: 0.25 },
      hole: { x: 0.80, y: 0.75, r: 0.018 },
      walls: [
        { x: 0.08, y: 0.12, w: 0.84, h: 0.02 },
        { x: 0.08, y: 0.86, w: 0.84, h: 0.02 },
        { x: 0.08, y: 0.12, w: 0.02, h: 0.76 },
        { x: 0.90, y: 0.12, w: 0.02, h: 0.76 },
        { x: 0.40, y: 0.12, w: 0.02, h: 0.40 },
        { x: 0.56, y: 0.48, w: 0.02, h: 0.40 }
      ],
      sand: [
        { x: 0.18, y: 0.55, w: 0.18, h: 0.18, friction: 0.88 }
      ],
      water: [
        { x: 0.42, y: 0.52, w: 0.14, h: 0.24 },
        { x: 0.58, y: 0.24, w: 0.20, h: 0.16 }
      ],
      bumpers: [
        { x: 0.32, y: 0.32, r: 0.025, bounciness: 1.2 },
        { x: 0.72, y: 0.64, r: 0.025, bounciness: 1.2 }
      ],
      movers: [
        { x: 0.64, y: 0.52, w: 0.10, h: 0.02, phase: 0, speed: 1.2, amp: 0.12, axis: 'y' }
      ]
    },
    {
      name: 'Starlight Switchback',
      par: 5,
      start: { x: 0.16, y: 0.78 },
      hole: { x: 0.84, y: 0.22, r: 0.018 },
      walls: [
        { x: 0.08, y: 0.12, w: 0.84, h: 0.02 },
        { x: 0.08, y: 0.86, w: 0.84, h: 0.02 },
        { x: 0.08, y: 0.12, w: 0.02, h: 0.76 },
        { x: 0.90, y: 0.12, w: 0.02, h: 0.76 },
        { x: 0.30, y: 0.48, w: 0.40, h: 0.02 },
        { x: 0.30, y: 0.48, w: 0.02, h: 0.26 },
        { x: 0.68, y: 0.22, w: 0.02, h: 0.26 }
      ],
      sand: [
        { x: 0.18, y: 0.60, w: 0.18, h: 0.16, friction: 0.86 },
        { x: 0.52, y: 0.26, w: 0.16, h: 0.14, friction: 0.88 }
      ],
      water: [
        { x: 0.40, y: 0.64, w: 0.32, h: 0.14 }
      ],
      bumpers: [
        { x: 0.36, y: 0.32, r: 0.025, bounciness: 1.25 },
        { x: 0.64, y: 0.72, r: 0.025, bounciness: 1.25 }
      ],
      movers: [
        { x: 0.46, y: 0.40, w: 0.10, h: 0.02, phase: 0.5, speed: 1.4, amp: 0.10, axis: 'x' },
        { x: 0.60, y: 0.56, w: 0.10, h: 0.02, phase: 1.2, speed: 1.0, amp: 0.10, axis: 'x' }
      ]
    }
  ];

  holeTotalEl.textContent = course.length.toString();

  // Game state
  let currentHoleIndex = 0;
  let ball = {
    x: 0,
    y: 0,
    r: 0.015,
    vx: 0,
    vy: 0
  };
  let strokesThisHole = 0;
  let totalStrokes = 0;
  let aiming = false;
  let aimStart = null;
  let aimCurrent = null;
  let lastTime = performance.now();
  let moversPhaseTime = 0;
  let courseCompleted = false;

  const BASE_FRICTION = 0.985;
  const STOP_SPEED = 0.015;
  const MAX_POWER = 1.25;
  const POWER_SCALE = 1.4;

  function resetHole(index) {
    const hole = course[index];
    const sx = hole.start.x * width;
    const sy = hole.start.y * height;
    ball.x = sx;
    ball.y = sy;
    ball.vx = 0;
    ball.vy = 0;
    strokesThisHole = 0;
    aiming = false;
    aimStart = null;
    aimCurrent = null;
    courseCompleted = false;
    updateHUD();
    setStatus(`Hole ${index + 1}: ${hole.name} • Par ${hole.par}`);
  }

  function resetCourse() {
    totalStrokes = 0;
    currentHoleIndex = 0;
    resetHole(currentHoleIndex);
  }

  function updateHUD() {
    const hole = course[currentHoleIndex];
    holeIndexEl.textContent = (currentHoleIndex + 1).toString();
    parValueEl.textContent = hole.par.toString();
    strokeValueEl.textContent = strokesThisHole.toString();
    totalStrokesEl.textContent = totalStrokes.toString();
  }

  function setStatus(msg) {
    statusMsgEl.textContent = msg;
  }

  function isBallMoving() {
    return Math.hypot(ball.vx, ball.vy) > STOP_SPEED;
  }

  function worldRect(rect) {
    return {
      x: rect.x * width,
      y: rect.y * height,
      w: rect.w * width,
      h: rect.h * height
    };
  }

  function worldCircle(circle) {
    return {
      x: circle.x * width,
      y: circle.y * height,
      r: circle.r * Math.min(width, height)
    };
  }

  function clamp(v, min, max) {
    return v < min ? min : v > max ? max : v;
  }

  function rectContainsPoint(rect, x, y) {
    return x >= rect.x && x <= rect.x + rect.w && y >= rect.y && y <= rect.y + rect.h;
  }

  function circleRectCollision(cx, cy, cr, rect) {
    const closestX = clamp(cx, rect.x, rect.x + rect.w);
    const closestY = clamp(cy, rect.y, rect.y + rect.h);
    const dx = cx - closestX;
    const dy = cy - closestY;
    const distSq = dx * dx + dy * dy;
    if (distSq > cr * cr) return null;
    const dist = Math.sqrt(distSq) || 0.0001;
    const overlap = cr - dist;
    return {
      nx: dx / dist,
      ny: dy / dist,
      overlap
    };
  }

  function circleCircleCollision(cx, cy, cr, ox, oy, or) {
    const dx = cx - ox;
    const dy = cy - oy;
    const distSq = dx * dx + dy * dy;
    const rSum = cr + or;
    if (distSq > rSum * rSum) return null;
    const dist = Math.sqrt(distSq) || 0.0001;
    const overlap = rSum - dist;
    return {
      nx: dx / dist,
      ny: dy / dist,
      overlap
    };
  }

  function updatePhysics(dt) {
    const hole = course[currentHoleIndex];

    // Movers animation time
    moversPhaseTime += dt;

    // Update movers positions
    const moversWorld = hole.movers.map(m => {
      const base = worldRect(m);
      const t = moversPhaseTime * m.speed + m.phase;
      const offset = Math.sin(t) * (m.amp * (m.axis === 'x' ? width : height));
      if (m.axis === 'x') {
        base.x += offset;
      } else {
        base.y += offset;
      }
      return base;
    });

    // Integrate velocity
    ball.x += ball.vx * dt;
    ball.y += ball.vy * dt;

    // Base friction
    let friction = BASE_FRICTION;

    // Sand friction
    for (const s of hole.sand) {
      const sr = worldRect(s);
      if (rectContainsPoint(sr, ball.x, ball.y)) {
        friction = Math.min(friction, s.friction);
      }
    }

    // Apply friction
    ball.vx *= Math.pow(friction, dt * 60);
    ball.vy *= Math.pow(friction, dt * 60);

    // Stop if slow
    if (Math.hypot(ball.vx, ball.vy) < STOP_SPEED) {
      ball.vx = 0;
      ball.vy = 0;
    }

    // Walls collision
    for (const w of hole.walls) {
      const wr = worldRect(w);
      const col = circleRectCollision(ball.x, ball.y, ball.r * Math.min(width, height), wr);
      if (col) {
        ball.x += col.nx * col.overlap;
        ball.y += col.ny * col.overlap;
        const dot = ball.vx * col.nx + ball.vy * col.ny;
        ball.vx -= 2 * dot * col.nx;
        ball.vy -= 2 * dot * col.ny;
        ball.vx *= 0.9;
        ball.vy *= 0.9;
      }
    }

    // Movers collision
    for (const wr of moversWorld) {
      const col = circleRectCollision(ball.x, ball.y, ball.r * Math.min(width, height), wr);
      if (col) {
        ball.x += col.nx * col.overlap;
        ball.y += col.ny * col.overlap;
        const dot = ball.vx * col.nx + ball.vy * col.ny;
        ball.vx -= 2 * dot * col.nx;
        ball.vy -= 2 * dot * col.ny;
        ball.vx *= 0.95;
        ball.vy *= 0.95;
      }
    }

    // Bumpers collision
    for (const b of hole.bumpers) {
      const bc = worldCircle(b);
      const col = circleCircleCollision(
        ball.x,
        ball.y,
        ball.r * Math.min(width, height),
        bc.x,
        bc.y,
        bc.r
      );
      if (col) {
        ball.x += col.nx * col.overlap;
        ball.y += col.ny * col.overlap;
        const dot = ball.vx * col.nx + ball.vy * col.ny;
        ball.vx -= 2 * dot * col.nx * b.bounciness;
        ball.vy -= 2 * dot * col.ny * b.bounciness;
      }
    }

    // Water reset
    for (const w of hole.water) {
      const wr = worldRect(w);
      if (rectContainsPoint(wr, ball.x, ball.y)) {
        const sx = hole.start.x * width;
        const sy = hole.start.y * height;
        ball.x = sx;
        ball.y = sy;
        ball.vx = 0;
        ball.vy = 0;
        setStatus('Splash! Ball returned to tee.');
        break;
      }
    }

    // Hole capture
    const hc = worldCircle(hole.hole);
    const distToHole = Math.hypot(ball.x - hc.x, ball.y - hc.y);
    const captureRadius = hc.r * 1.4;
    if (!isBallMoving() && distToHole < captureRadius) {
      ball.x = hc.x;
      ball.y = hc.y;
      ball.vx = 0;
      ball.vy = 0;
      onHoleComplete();
    }
  }

  function onHoleComplete() {
    if (courseCompleted) return;
    courseCompleted = true;
    const hole = course[currentHoleIndex];
    const diff = strokesThisHole - hole.par;
    let verdict;
    if (strokesThisHole === 1) {
      verdict = 'Astro Ace! Hole-in-one!';
    } else if (diff <= -2) {
      verdict = 'Stellar! Two under par.';
    } else if (diff === -1) {
      verdict = 'Nice! One under par.';
    } else if (diff === 0) {
      verdict = 'On par. Smooth orbit.';
    } else if (diff === 1) {
      verdict = 'Over par, but the stars approve.';
    } else {
      verdict = 'Tough hole—space is unforgiving.';
    }

    if (currentHoleIndex < course.length - 1) {
      setStatus(`${verdict} Tap anywhere to continue to the next hole.`);
    } else {
      const parTotal = course.reduce((s, h) => s + h.par, 0);
      const diffTotal = totalStrokes - parTotal;
      let summary;
      if (diffTotal < 0) {
        summary = `You finished ${-diffTotal} under par. Cosmic precision!`;
      } else if (diffTotal === 0) {
        summary = 'You matched par for the course. Balanced like a galaxy.';
      } else {
        summary = `You finished ${diffTotal} over par. The nebula believes in you.`;
      }
      setStatus(`Course complete! Total strokes: ${totalStrokes}. ${summary} Press "Restart Course" to play again.`);
    }
  }

  function nextHole() {
    if (currentHoleIndex < course.length - 1) {
      currentHoleIndex++;
      resetHole(currentHoleIndex);
    }
  }

  // Input handling
  function getEventPos(e) {
    const rect = canvas.getBoundingClientRect();
    if (e.touches && e.touches.length > 0) {
      return {
        x: (e.touches[0].clientX - rect.left),
        y: (e.touches[0].clientY - rect.top)
      };
    } else if (e.changedTouches && e.changedTouches.length > 0) {
      return {
        x: (e.changedTouches[0].clientX - rect.left),
        y: (e.changedTouches[0].clientY - rect.top)
      };
    } else {
      return {
        x: (e.clientX - rect.left),
        y: (e.clientY - rect.top)
      };
    }
  }

  function startAim(e) {
    if (courseCompleted) {
      if (currentHoleIndex < course.length - 1) {
        nextHole();
      }
      return;
    }
    if (isBallMoving()) return;
    const pos = getEventPos(e);
    const dist = Math.hypot(pos.x - ball.x, pos.y - ball.y);
    const maxTapDist = ball.r * Math.min(width, height) * 2.2;
    if (dist <= maxTapDist) {
      aiming = true;
      aimStart = { x: ball.x, y: ball.y };
      aimCurrent = { x: pos.x, y: pos.y };
      e.preventDefault();
    }
  }

  function moveAim(e) {
    if (!aiming) return;
    const pos = getEventPos(e);
    aimCurrent = { x: pos.x, y: pos.y };
    e.preventDefault();
  }

  function endAim(e) {
    if (!aiming) return;
    const pos = getEventPos(e);
    aimCurrent = { x: pos.x, y: pos.y };
    const dx = aimStart.x - aimCurrent.x;
    const dy = aimStart.y - aimCurrent.y;
    let power = Math.hypot(dx, dy) / Math.min(width, height);
    power = Math.min(power * POWER_SCALE, MAX_POWER);
    if (power > 0.02) {
      const dirX = dx / (Math.hypot(dx, dy) || 1);
      const dirY = dy / (Math.hypot(dx, dy) || 1);
      const speed = power * 1.6 * Math.min(width, height) / 600;
      ball.vx = dirX * speed;
      ball.vy = dirY * speed;
      strokesThisHole++;
      totalStrokes++;
      updateHUD();
      setStatus(`Stroke ${strokesThisHole} on Hole ${currentHoleIndex + 1}.`);
    }
    aiming = false;
    aimStart = null;
    aimCurrent = null;
    e.preventDefault();
  }

  canvas.addEventListener('mousedown', startAim);
  canvas.addEventListener('mousemove', moveAim);
  window.addEventListener('mouseup', endAim);

  canvas.addEventListener('touchstart', startAim, { passive: false });
  canvas.addEventListener('touchmove', moveAim, { passive: false });
  canvas.addEventListener('touchend', endAim, { passive: false });
  canvas.addEventListener('touchcancel', endAim, { passive: false });

  canvas.addEventListener('click', function () {
    if (courseCompleted && currentHoleIndex < course.length - 1) {
      nextHole();
    }
  });

  resetBtn.addEventListener('click', function () {
    resetCourse();
  });

  // Rendering
  function drawBackground() {
    const gradient = ctx.createRadialGradient(
      width * 0.2,
      height * 0.1,
      Math.min(width, height) * 0.1,
      width * 0.5,
      height * 0.5,
      Math.max(width, height) * 0.9
    );
    gradient.addColorStop(0, '#1a365d');
    gradient.addColorStop(0.4, '#0b1120');
    gradient.addColorStop(1, '#02010a');
    ctx.fillStyle = gradient;
    ctx.fillRect(0, 0, width, height);

    // Stars
    const starCount = Math.floor((width * height) / 12000);
    ctx.fillStyle = 'rgba(226, 232, 240, 0.7)';
    for (let i = 0; i < starCount; i++) {
      const x = (i * 73) % width;
      const y = (i * 127) % height;
      const r = (i % 3 === 0) ? 1.2 : 0.7;
      ctx.beginPath();
      ctx.arc(x, y, r, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  function drawCourse() {
    const hole = course[currentHoleIndex];

    // Playfield base
    const pad = Math.min(width, height) * 0.06;
    const fieldRect = {
      x: pad,
      y: pad,
      w: width - pad * 2,
      h: height - pad * 2
    };
    const fieldGrad = ctx.createLinearGradient(fieldRect.x, fieldRect.y, fieldRect.x, fieldRect.y + fieldRect.h);
    fieldGrad.addColorStop(0, '#14532d');
    fieldGrad.addColorStop(1, '#166534');
    ctx.fillStyle = fieldGrad;
    ctx.strokeStyle = 'rgba(15, 23, 42, 0.9)';
    ctx.lineWidth = 3;
    ctx.beginPath();
    const radius = 18;
    ctx.moveTo(fieldRect.x + radius, fieldRect.y);
    ctx.lineTo(fieldRect.x + fieldRect.w - radius, fieldRect.y);
    ctx.quadraticCurveTo(fieldRect.x + fieldRect.w, fieldRect.y, fieldRect.x + fieldRect.w, fieldRect.y + radius);
    ctx.lineTo(fieldRect.x + fieldRect.w, fieldRect.y + fieldRect.h - radius);
    ctx.quadraticCurveTo(fieldRect.x + fieldRect.w, fieldRect.y + fieldRect.h, fieldRect.x + fieldRect.w - radius, fieldRect.y + fieldRect.h);
    ctx.lineTo(fieldRect.x + radius, fieldRect.y + fieldRect.h);
    ctx.quadraticCurveTo(fieldRect.x, fieldRect.y + fieldRect.h, fieldRect.x, fieldRect.y + fieldRect.h - radius);
    ctx.lineTo(fieldRect.x, fieldRect.y + radius);
    ctx.quadraticCurveTo(fieldRect.x, fieldRect.y, fieldRect.x + radius, fieldRect.y);
    ctx.closePath();
    ctx.fill();
    ctx.stroke();

    // Sand
    for (const s of hole.sand) {
      const sr = worldRect(s);
      const grad = ctx.createLinearGradient(sr.x, sr.y, sr.x + sr.w, sr.y + sr.h);
      grad.addColorStop(0, '#f6e0a3');
      grad.addColorStop(1, '#e9c46a');
      ctx.fillStyle = grad;
      ctx.beginPath();
      ctx.roundRect(sr.x, sr.y, sr.w, sr.h, 10);
      ctx.fill();
      ctx.strokeStyle = 'rgba(180, 137, 60, 0.7)';
      ctx.lineWidth = 1.5;
      ctx.stroke();
    }

    // Water
    for (const w of hole.water) {
      const wr = worldRect(w);
      const grad = ctx.createLinearGradient(wr.x, wr.y, wr.x + wr.w, wr.y + wr.h);
      grad.addColorStop(0, '#38bdf8');
      grad.addColorStop(1, '#1d4ed8');
      ctx.fillStyle = grad;
      ctx.beginPath();
      ctx.roundRect(wr.x, wr.y, wr.w, wr.h, 12);
      ctx.fill();
      ctx.strokeStyle = 'rgba(30, 64, 175, 0.9)';
      ctx.lineWidth = 2;
      ctx.stroke();

      ctx.strokeStyle = 'rgba(191, 219, 254, 0.7)';
      ctx.lineWidth = 1;
      const waveCount = 4;
      for (let i = 0; i < waveCount; i++) {
        const yy = wr.y + (wr.h * (i + 1)) / (waveCount + 1);
        ctx.beginPath();
        ctx.moveTo(wr.x + 6, yy);
        ctx.quadraticCurveTo(wr.x + wr.w * 0.5, yy + 3, wr.x + wr.w - 6, yy);
        ctx.stroke();
      }
    }

    // Walls
    for (const w of hole.walls) {
      const wr = worldRect(w);
      const grad = ctx.createLinearGradient(wr.x, wr.y, wr.x + wr.w, wr.y + wr.h);
      grad.addColorStop(0, '#4b5563');
      grad.addColorStop(1, '#111827');
      ctx.fillStyle = grad;
      ctx.beginPath();
      ctx.roundRect(wr.x, wr.y, wr.w, wr.h, 6);
      ctx.fill();
      ctx.strokeStyle = 'rgba(15, 23, 42, 0.9)';
      ctx.lineWidth = 2;
      ctx.stroke();
    }

    // Movers
    const moversWorld = hole.movers.map(m => {
      const base = worldRect(m);
      const t = moversPhaseTime * m.speed + m.phase;
      const offset = Math.sin(t) * (m.amp * (m.axis === 'x' ? width : height));
      if (m.axis === 'x') {
        base.x += offset;
      } else {
        base.y += offset;
      }
      return base;
    });

    for (const wr of moversWorld) {
      const grad = ctx.createLinearGradient(wr.x, wr.y, wr.x + wr.w, wr.y + wr.h);
      grad.addColorStop(0, '#f97316');
      grad.addColorStop(1, '#facc15');
      ctx.fillStyle = grad;
      ctx.beginPath();
      ctx.roundRect(wr.x, wr.y, wr.w, wr.h, 6);
      ctx.fill();
      ctx.strokeStyle = 'rgba(124, 45, 18, 0.9)';
      ctx.lineWidth = 2;
      ctx.stroke();
    }

    // Bumpers
    for (const b of hole.bumpers) {
      const bc = worldCircle(b);
      const grad = ctx.createRadialGradient(bc.x - 3, bc.y - 3, 2, bc.x, bc.y, bc.r);
      grad.addColorStop(0, '#f97316');
      grad.addColorStop(1, '#b91c1c');
      ctx.fillStyle = grad;
      ctx.beginPath();
      ctx.arc(bc.x, bc.y, bc.r, 0, Math.PI * 2);
      ctx.fill();
      ctx.strokeStyle = 'rgba(15, 23, 42, 0.9)';
      ctx.lineWidth = 2;
      ctx.stroke();
    }

    // Hole
    const hc = worldCircle(hole.hole);
    ctx.save();
    ctx.shadowColor = 'rgba(0, 0, 0, 0.8)';
    ctx.shadowBlur = 10;
    ctx.fillStyle = '#020617';
    ctx.beginPath();
    ctx.arc(hc.x, hc.y, hc.r * 1.1, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();

    // Flag
    const flagHeight = hc.r * 4;
    const flagX = hc.x + hc.r * 0.2;
    const flagY = hc.y - flagHeight;
    ctx.strokeStyle = '#e5e7eb';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(flagX, hc.y);
    ctx.lineTo(flagX, flagY);
    ctx.stroke();

    ctx.beginPath();
    ctx.moveTo(flagX, flagY);
    ctx.lineTo(flagX + hc.r * 2.2, flagY + hc.r * 0.8);
    ctx.lineTo(flagX, flagY + hc.r * 1.6);
    ctx.closePath();
    const flagGrad = ctx.createLinearGradient(flagX, flagY, flagX + hc.r * 2.2, flagY + hc.r * 1.6);
    flagGrad.addColorStop(0, '#f97316');
    flagGrad.addColorStop(1, '#fb7185');
    ctx.fillStyle = flagGrad;
    ctx.fill();
  }

  function drawBall() {
    const r = ball.r * Math.min(width, height);
    const speed = Math.hypot(ball.vx, ball.vy);
    const spin = speed * 40;
    const highlightOffsetX = Math.cos(spin) * (r * 0.3);
    const highlightOffsetY = Math.sin(spin) * (r * 0.3);

    ctx.save();
    ctx.shadowColor = 'rgba(15, 23, 42, 0.9)';
    ctx.shadowBlur = 12;
    ctx.shadowOffsetY = 3;
    ctx.beginPath();
    ctx.arc(ball.x, ball.y, r, 0, Math.PI * 2);
    const grad = ctx.createRadialGradient(
      ball.x - highlightOffsetX,
      ball.y - highlightOffsetY,
      r * 0.2,
      ball.x,
      ball.y,
      r
    );
    grad.addColorStop(0, '#f9fafb');
    grad.addColorStop(0.4, '#e5e7eb');
    grad.addColorStop(1, '#9ca3af');
    ctx.fillStyle = grad;
    ctx.fill();
    ctx.restore();

    // Dimples
    ctx.save();
    ctx.globalAlpha = 0.25;
    ctx.fillStyle = '#9ca3af';
    const dCount = 6;
    for (let i = 0; i < dCount; i++) {
      const angle = (i / dCount) * Math.PI * 2 + spin * 0.05;
      const dr = r * 0.55;
      const dx = Math.cos(angle) * dr;
      const dy = Math.sin(angle) * dr;
      ctx.beginPath();
      ctx.arc(ball.x + dx, ball.y + dy, r * 0.12, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.restore();
  }

  function drawAim() {
    if (!aiming || !aimStart || !aimCurrent) return;
    const dx = aimStart.x - aimCurrent.x;
    const dy = aimStart.y - aimCurrent.y;
    let power = Math.hypot(dx, dy) / Math.min(width, height);
    power = Math.min(power * POWER_SCALE, MAX_POWER);
    const dirX = dx / (Math.hypot(dx, dy) || 1);
    const dirY = dy / (Math.hypot(dx, dy) || 1);
    const maxLen = Math.min(width, height) * 0.25;
    const len = maxLen * (power / MAX_POWER);

    const startX = ball.x;
    const startY = ball.y;
    const endX = startX + dirX * len;
    const endY = startY + dirY * len;

    const grad = ctx.createLinearGradient(startX, startY, endX, endY);
    grad.addColorStop(0, 'rgba(248, 250, 252, 0.1)');
    grad.addColorStop(1, 'rgba(56, 189, 248, 0.9)');
    ctx.strokeStyle = grad;
    ctx.lineWidth = 3;
    ctx.setLineDash([8, 6]);
    ctx.beginPath();
    ctx.moveTo(startX, startY);
    ctx.lineTo(endX, endY);
    ctx.stroke();
    ctx.setLineDash([]);

    ctx.fillStyle = 'rgba(56, 189, 248, 0.9)';
    ctx.beginPath();
    ctx.arc(endX, endY, 5, 0, Math.PI * 2);
    ctx.fill();

    ctx.font = '11px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif';
    ctx.fillStyle = 'rgba(226, 232, 240, 0.9)';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'bottom';
    ctx.fillText(`Power ${(power * 100) | 0}%`, endX, endY - 10);
  }

  function drawOverlayText() {
    const hole = course[currentHoleIndex];
    ctx.font = '12px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif';
    ctx.textAlign = 'left';
    ctx.textBaseline = 'top';
    ctx.fillStyle = 'rgba(226, 232, 240, 0.9)';
    ctx.fillText(`Hole ${currentHoleIndex + 1}: ${hole.name}`, 14, 12);

    ctx.textAlign = 'right';
    ctx.fillStyle = 'rgba(148, 163, 184, 0.9)';
    ctx.fillText(`Par ${hole.par} • Stroke ${strokesThisHole}`, width - 14, 12);
  }

  function loop(now) {
    const dt = Math.min((now - lastTime) / 1000, 0.04);
    lastTime = now;

    updatePhysics(dt);

    drawBackground();
    drawCourse();
    drawBall();
    drawAim();
    drawOverlayText();

    requestAnimationFrame(loop);
  }

  resetCourse();
  requestAnimationFrame(loop);
})();
</script>
</body>
</html>
