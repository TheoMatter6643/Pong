<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, shrink-to-fit=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Neon Pulse Golf</title>
    <style>
        :root {
            --bg-dark: #0a0b10;
            --panel-bg: rgba(20, 22, 34, 0.85);
            --neon-blue: #00f0ff;
            --neon-pink: #ff007f;
            --neon-green: #39ff14;
            --neon-purple: #9d00ff;
            --text-light: #f0f2f5;
        }

        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
            touch-action: none;
            margin: 0;
            padding: 0;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: var(--bg-dark);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            color: var(--text-light);
        }

        #game-container {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            background: radial-gradient(circle at center, #141829 0%, #05060a 100%);
        }

        canvas {
            display: block;
            box-shadow: 0 0 40px rgba(0, 0, 0, 0.8);
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }

        /* User Interface overlays */
        .hud-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: calc(20px + env(safe-area-inset-top)) calc(20px + env(safe-area-inset-right)) calc(20px + env(safe-area-inset-bottom)) calc(20px + env(safe-area-inset-left));
        }

        .interactive {
            pointer-events: auto;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
        }

        .stats-card {
            background: var(--panel-bg);
            padding: 10px 20px;
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            display: flex;
            gap: 20px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        .stat-item {
            display: flex;
            flex-direction: column;
        }

        .stat-label {
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: rgba(255, 255, 255, 0.5);
            margin-bottom: 2px;
        }

        .stat-value {
            font-size: 22px;
            font-weight: 800;
            font-variant-numeric: tabular-nums;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.2);
        }

        .stat-value.blue { color: var(--neon-blue); text-shadow: 0 0 10px rgba(0, 240, 255, 0.5); }
        .stat-value.pink { color: var(--neon-pink); text-shadow: 0 0 10px rgba(255, 0, 127, 0.5); }
        .stat-value.green { color: var(--neon-green); text-shadow: 0 0 10px rgba(57, 255, 20, 0.5); }

        .icon-btn {
            background: var(--panel-bg);
            border: 1px solid rgba(255, 255, 255, 0.1);
            width: 48px;
            height: 48px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            font-size: 20px;
            cursor: pointer;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            transition: all 0.2s ease;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        .icon-btn:active {
            transform: scale(0.92);
            border-color: var(--neon-blue);
            box-shadow: 0 0 15px rgba(0, 240, 255, 0.4);
        }

        /* Screen Overlays (Modal style) */
        .screen-mask {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(5, 6, 10, 0.85);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.4s ease, visibility 0.4s ease;
        }

        .screen-mask.active {
            opacity: 1;
            visibility: visible;
        }

        .menu-panel {
            background: linear-gradient(135deg, rgba(20, 24, 41, 0.95) 0%, rgba(10, 12, 20, 0.95) 100%);
            border: 1px solid rgba(0, 240, 255, 0.2);
            border-radius: 32px;
            padding: 40px;
            width: 90%;
            max-width: 460px;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0, 240, 255, 0.1);
            transform: translateY(30px);
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .screen-mask.active .menu-panel {
            transform: translateY(0);
        }

        h1 {
            font-size: 36px;
            font-weight: 900;
            letter-spacing: -1px;
            margin-bottom: 10px;
            background: linear-gradient(45deg, var(--neon-blue), var(--neon-purple), var(--neon-pink));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }

        .subtitle {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.6);
            margin-bottom: 35px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .menu-stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 35px;
        }

        .menu-stat-box {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.07);
            border-radius: 16px;
            padding: 15px;
        }

        .menu-stat-box .val {
            font-size: 28px;
            font-weight: 800;
            margin-top: 5px;
        }

        .primary-btn {
            background: linear-gradient(90deg, #00c6ff 0%, #0072ff 100%);
            border: none;
            border-radius: 18px;
            color: white;
            padding: 18px 36px;
            font-size: 18px;
            font-weight: 700;
            letter-spacing: 1px;
            cursor: pointer;
            width: 100%;
            box-shadow: 0 6px 20px rgba(0, 114, 255, 0.4);
            transition: all 0.2s ease;
        }

        .primary-btn:active {
            transform: scale(0.96);
            box-shadow: 0 3px 10px rgba(0, 114, 255, 0.2);
        }

        /* In-game floating instructions */
        #aim-guide-toast {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.6);
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 12px;
            letter-spacing: 1px;
            text-transform: uppercase;
            color: rgba(255, 255, 255, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.1);
            pointer-events: none;
            opacity: 1;
            transition: opacity 1s ease;
        }
    </style>
</head>
<body>

    <div id="game-container">
        <canvas id="gameCanvas"></canvas>

        <div class="hud-layer">
            <div class="top-bar">
                <div class="stats-card">
                    <div class="stat-item">
                        <span class="stat-label">Hole</span>
                        <span id="hud-hole" class="stat-value blue">1/9</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-label">Par</span>
                        <span id="hud-par" class="stat-value">3</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-label">Strokes</span>
                        <span id="hud-strokes" class="stat-value pink">0</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-label">Total</span>
                        <span id="hud-total" class="stat-value green">0</span>
                    </div>
                </div>
                <button id="reset-btn" class="icon-btn interactive" aria-label="Reset Ball">⟳</button>
            </div>
            <div id="aim-guide-toast">Drag backward from ball to aim</div>
        </div>

        <div id="start-screen" class="screen-mask active">
            <div class="menu-panel">
                <h1>NEON PULSE</h1>
                <div class="subtitle">Tactical Vector Mini Golf</div>
                <div style="margin: 40px 0;">
                    <svg width="80" height="80" viewBox="0 0 100 100" style="filter: drop-shadow(0 0 10px var(--neon-blue))">
                        <circle cx="50" cy="50" r="40" fill="none" stroke="#00f0ff" stroke-width="3" stroke-dasharray="6 4" />
                        <circle cx="50" cy="50" r="8" fill="#ff007f" />
                        <line x1="50" y1="50" x2="80" y2="80" stroke="#00f0ff" stroke-width="4" stroke-linecap="round"/>
                    </svg>
                </div>
                <button id="start-btn" class="primary-btn interactive">START TOURNAMENT</button>
            </div>
        </div>

        <div id="score-screen" class="screen-mask">
            <div class="menu-panel">
                <h1 id="score-title">HOLE IN ONE!</h1>
                <div id="score-subtitle" class="subtitle" style="color: var(--neon-green);">Awesome Shot</div>
                <div class="menu-stats">
                    <div class="menu-stat-box">
                        <div class="stat-label">Hole Strokes</div>
                        <div id="score-strokes" class="val pink">1</div>
                    </div>
                    <div class="menu-stat-box">
                        <div class="stat-label">Running Score</div>
                        <div id="score-total" class="val green">-2</div>
                    </div>
                </div>
                <button id="next-btn" class="primary-btn interactive">CONTINUE COURSE</button>
            </div>
        </div>

        <div id="victory-screen" class="screen-mask">
            <div class="menu-panel">
                <h1>TOUR COMPLETE</h1>
                <div class="subtitle" style="color: var(--neon-blue);">Final Performance Metrics</div>
                <div class="menu-stats" style="grid-template-columns: 1fr;">
                    <div class="menu-stat-box" style="padding: 20px;">
                        <div class="stat-label">Final Score Evaluation</div>
                        <div id="victory-final-score" class="val blue" style="font-size: 42px;">-4</div>
                        <div id="victory-rating" style="margin-top: 10px; font-size: 14px; letter-spacing: 3px; color: var(--neon-green);">NEON MASTER</div>
                    </div>
                </div>
                <button id="restart-btn" class="primary-btn interactive">PLAY AGAIN</button>
            </div>
        </div>
    </div>

    <script>
        /**
         * Neon Pulse Golf - Core Game Architecture
         */
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // Target logical design dimensions (10:16 Portrait Optimized for Mobile/iPad)
        const BASE_W = 800;
        const BASE_H = 1100;
        let scaleFactor = 1;

        // Vector Algebra Helpers
        const vec = {
            create: (x = 0, y = 0) => ({ x, y }),
            add: (v1, v2) => ({ x: v1.x + v2.x, y: v1.y + v2.y }),
            sub: (v1, v2) => ({ x: v1.x - v2.x, y: v1.y - v2.y }),
            mult: (v, n) => ({ x: v.x * n, y: v.y * n }),
            dot: (v1, v2) => v1.x * v2.x + v1.y * v2.y,
            magSq: (v) => v.x * v.x + v.y * v.y,
            mag: (v) => Math.sqrt(v.x * v.x + v.y * v.y),
            normalize: (v) => {
                const m = Math.sqrt(v.x * v.x + v.y * v.y);
                return m === 0 ? { x: 0, y: 0 } : { x: v.x / m, y: v.y / m };
            },
            dist: (v1, v2) => Math.sqrt((v1.x - v2.x) ** 2 + (v1.y - v2.y) ** 2),
            distSq: (v1, v2) => (v1.x - v2.x) ** 2 + (v1.y - v2.y) ** 2,
            reflect: (v, n) => {
                const d = v.x * n.x + v.y * n.y;
                return { x: v.x - 2 * d * n.x, y: v.y - 2 * d * n.y };
            }
        };

        // Rigid Dynamic Bodies Config
        const PHYSICS = {
            friction: 0.988,
            subSteps: 8, // Sub-stepping for ultra-precise high-speed tunnel prevention
            ballRadius: 14,
            holeRadius: 22,
            minSpeedStop: 0.15,
            maxPower: 24,
            aimScale: 0.07
        };

        // System state variables
        let currentHoleIndex = 0;
        let strokeCount = 0;
        let totalScoreRelativeToPar = 0;
        let particles = [];
        let gameLoopId = null;
        let isTransitioning = false;

        // Input Tracking State
        const input = {
            isAiming: false,
            startPos: vec.create(),
            currentPos: vec.create(),
            dragVector: vec.create(),
            touchId: null
        };

        // Ball State
        const ball = {
            pos: vec.create(),
            vel: vec.create(),
            radius: PHYSICS.ballRadius,
            isSunk: false,
            sinkScale: 1,
            lastSafePos: vec.create()
        };

        // Level Design Definition Matrix
        // Built mathematically using local coordinates within bounds [50 to 750 width, 120 to 1020 height]
        const HOLES = [
            // Hole 1: Introductory Straight Shot
            {
                par: 3,
                start: vec.create(400, 900),
                hole: vec.create(400, 250),
                walls: [
                    { a: vec.create(200, 150), b: vec.create(600, 150) },
                    { a: vec.create(600, 150), b: vec.create(600, 1000) },
                    { a: vec.create(600, 1000), b: vec.create(200, 1000) },
                    { a: vec.create(200, 1000), b: vec.create(200, 150) }
                ],
                hazards: [],
                modifiers: []
            },
            // Hole 2: The Chevron Split (Obstacle in center)
            {
                par: 3,
                start: vec.create(400, 950),
                hole: vec.create(400, 200),
                walls: [
                    { a: vec.create(150, 100), b: vec.create(650, 100) },
                    { a: vec.create(650, 100), b: vec.create(650, 1020) },
                    { a: vec.create(650, 1020), b: vec.create(150, 1020) },
                    { a: vec.create(150, 1020), b: vec.create(150, 100) },
                    // Triangle Center Wedge
                    { a: vec.create(400, 450), b: vec.create(520, 600) },
                    { a: vec.create(520, 600), b: vec.create(280, 600) },
                    { a: vec.create(280, 600), b: vec.create(400, 450) }
                ],
                hazards: [],
                modifiers: []
            },
            // Hole 3: Refraction Corridor (Zig-Zag)
            {
                par: 3,
                start: vec.create(150, 900),
                hole: vec.create(650, 200),
                walls: [
                    { a: vec.create(50, 100), b: vec.create(750, 100) },
                    { a: vec.create(750, 100), b: vec.create(750, 1020) },
                    { a: vec.create(750, 1020), b: vec.create(50, 1020) },
                    { a: vec.create(50, 1020), b: vec.create(50, 100) },
                    // Baffles
                    { a: vec.create(50, 700), b: vec.create(500, 700) },
                    { a: vec.create(300, 400), b: vec.create(750, 400) }
                ],
                hazards: [],
                modifiers: []
            },
            // Hole 4: Kinetic Boost Accelerator (Boost Pads Introduce)
            {
                par: 4,
                start: vec.create(400, 950),
                hole: vec.create(400, 180),
                walls: [
                    { a: vec.create(200, 80), b: vec.create(600, 80) },
                    { a: vec.create(600, 80), b: vec.create(600, 1040) },
                    { a: vec.create(600, 1040), b: vec.create(200, 1040) },
                    { a: vec.create(200, 1040), b: vec.create(200, 80) },
                    // Choke point wall lines
                    { a: vec.create(200, 550), b: vec.create(350, 550) },
                    { a: vec.create(450, 550), b: vec.create(600, 550) }
                ],
                hazards: [],
                modifiers: [
                    // Dynamic Accelerators {type, x, y, r, forceVel}
                    { type: 'boost', x: 300, y: 750, r: 45, force: vec.create(0, -15) },
                    { type: 'boost', x: 500, y: 750, r: 45, force: vec.create(0, -15) }
                ]
            },
            // Hole 5: Sector Vortex (Gravitational Singularity)
            {
                par: 4,
                start: vec.create(400, 950),
                hole: vec.create(400, 200),
                walls: [
                    { a: vec.create(100, 100), b: vec.create(700, 100) },
                    { a: vec.create(700, 100), b: vec.create(700, 1050) },
                    { a: vec.create(700, 1050), b: vec.create(100, 1050) },
                    { a: vec.create(100, 1050), b: vec.create(100, 100) }
                ],
                hazards: [],
                modifiers: [
                    // Gravity Well pulling objects toward it
                    { type: 'vortex', x: 400, y: 550, r: 160, strength: 0.6 }
                ]
            },
            // Hole 6: The Gauntlet (Dynamic Spinners)
            {
                par: 4,
                start: vec.create(400, 950),
                hole: vec.create(400, 150),
                walls: [
                    { a: vec.create(150, 50), b: vec.create(650, 50) },
                    { a: vec.create(650, 50), b: vec.create(650, 1050) },
                    { a: vec.create(650, 1050), b: vec.create(150, 1050) },
                    { a: vec.create(150, 1050), b: vec.create(150, 50) }
                ],
                hazards: [],
                modifiers: [
                    // Dynamic Rotators tracking phase angle {type, cx, cy, len, angle, speed}
                    { type: 'spinner', cx: 300, cy: 450, len: 110, angle: 0, speed: 0.03, walls: [] },
                    { type: 'spinner', cx: 500, cy: 700, len: 110, angle: Math.PI, speed: -0.025, walls: [] }
                ]
            },
            // Hole 7: Quantum Entropic Void (Hazard zones)
            {
                par: 4,
                start: vec.create(400, 950),
                hole: vec.create(400, 150),
                walls: [
                    { a: vec.create(150, 50), b: vec.create(650, 50) },
                    { a: vec.create(650, 50), b: vec.create(650, 1050) },
                    { a: vec.create(650, 1050), b: vec.create(150, 1050) },
                    { a: vec.create(150, 1050), b: vec.create(150, 50) },
                    { a: vec.create(300, 400), b: vec.create(500, 400) }
                ],
                hazards: [
                    // Vaporization Pools
                    { x: 400, y: 650, r: 80 }
                ],
                modifiers: []
            },
            // Hole 8: Pinball Matrix (Bouncy Circular Bumpers)
            {
                par: 5,
                start: vec.create(400, 950),
                hole: vec.create(400, 150),
                walls: [
                    { a: vec.create(100, 50), b: vec.create(700, 50) },
                    { a: vec.create(700, 50), b: vec.create(700, 1050) },
                    { a: vec.create(700, 1050), b: vec.create(100, 1050) },
                    { a: vec.create(100, 1050), b: vec.create(100, 50) }
                ],
                hazards: [],
                modifiers: [
                    { type: 'bumper', x: 250, y: 400, r: 40, pulse: 0 },
                    { type: 'bumper', x: 550, y: 400, r: 40, pulse: 0 },
                    { type: 'bumper', x: 400, y: 600, r: 50, pulse: 0 },
                    { type: 'bumper', x: 200, y: 750, r: 35, pulse: 0 },
                    { type: 'bumper', x: 600, y: 750, r: 35, pulse: 0 }
                ]
            },
            // Hole 9: Grand Finale Mastery Map
            {
                par: 5,
                start: vec.create(400, 950),
                hole: vec.create(400, 180),
                walls: [
                    { a: vec.create(50, 50), b: vec.create(750, 50) },
                    { a: vec.create(750, 50), b: vec.create(750, 1050) },
                    { a: vec.create(750, 1050), b: vec.create(50, 1050) },
                    { a: vec.create(50, 1050), b: vec.create(50, 50) },
                    // Central physical blockades
                    { a: vec.create(250, 320), b: vec.create(550, 320) }
                ],
                hazards: [
                    { x: 200, y: 550, r: 70 },
                    { x: 600, y: 550, r: 70 }
                ],
                modifiers: [
                    { type: 'spinner', cx: 400, cy: 450, len: 140, angle: 0, speed: 0.04, walls: [] },
                    { type: 'boost', x: 120, y: 800, r: 40, force: vec.create(0, -18) },
                    { type: 'boost', x: 680, y: 800, r: 40, force: vec.create(0, -18) },
                    { type: 'vortex', x: 400, y: 180, r: 90, strength: 0.25 }
                ]
            }
        ];

        /**
         * Initialize & Adapt Workspace Display Scale
         */
        function resizeCanvas() {
            const containerW = window.innerWidth;
            const containerH = window.innerHeight;
            
            // Determine maximum scale factor fitting screen limits aspect ratios
            scaleFactor = Math.min(containerW / BASE_W, containerH / BASE_H);
            
            canvas.width = BASE_W * scaleFactor;
            canvas.height = BASE_H * scaleFactor;
            
            ctx.imageSmoothingEnabled = true;
            ctx.imageSmoothingQuality = 'high';
        }

        window.addEventListener('resize', resizeCanvas);
        window.addEventListener('orientationchange', () => {
            setTimeout(resizeCanvas, 300);
        });

        /**
         * Particle Simulation Architecture
         */
        function createExplosion(pos, color, count = 25, speedMult = 1) {
            for (let i = 0; i < count; i++) {
                const angle = Math.random() * Math.PI * 2;
                const speed = (Math.random() * 5 + 2) * speedMult;
                particles.push({
                    pos: vec.create(pos.x, pos.y),
                    vel: vec.create(Math.cos(angle) * speed, Math.sin(angle) * speed),
                    radius: Math.random() * 4 + 2,
                    color: color,
                    alpha: 1,
                    decay: Math.random() * 0.02 + 0.015
                });
            }
        }

        function updateParticles() {
            for (let i = particles.length - 1; i >= 0; i--) {
                const p = particles[i];
                p.pos = vec.add(p.pos, p.vel);
                p.vel = vec.mult(p.vel, 0.96); // Drag
                p.alpha -= p.decay;
                if (p.alpha <= 0) {
                    particles.splice(i, 1);
                }
            }
        }

        /**
         * Engine Math Physics Core & Intersection Calculations
         */
        function getClosestPointOnSegment(p, a, b) {
            const ab = vec.sub(b, a);
            const ap = vec.sub(p, a);
            let t = vec.dot(ap, ab) / vec.magSq(ab);
            t = Math.max(0, Math.min(1, t)); // Constrain to segment boundaries
            return vec.add(a, vec.mult(ab, t));
        }

        function updateLevelMechanics(level) {
            if (!level.modifiers) return;
            
            level.modifiers.forEach(mod => {
                if (mod.type === 'spinner') {
                    mod.angle += mod.speed;
                    const halfX = Math.cos(mod.angle) * mod.len;
                    const halfY = Math.sin(mod.angle) * mod.len;
                    
                    // Recompute line dynamic position mapping
                    mod.walls = [{
                        a: vec.create(mod.cx - halfX, mod.cy - halfY),
                        b: vec.create(mod.cx + halfX, mod.cy + halfY)
                    }];
                } else if (mod.type === 'bumper' && mod.pulse > 0) {
                    mod.pulse -= 0.1;
                }
            });
        }

        function executePhysicsStep() {
            if (ball.isSunk) return;

            const level = HOLES[currentHoleIndex];
            
            // Collate all active walls (static + kinetic mechanical layers)
            let activeWalls = [...level.walls];
            if (level.modifiers) {
                level.modifiers.forEach(mod => {
                    if (mod.type === 'spinner' && mod.walls) {
                        activeWalls.push(...mod.walls);
                    }
                });
            }

            // Environment Field Modifier Forces (Vortex / Gravity Field)
            if (level.modifiers) {
                level.modifiers.forEach(mod => {
                    if (mod.type === 'vortex') {
                        const d = vec.dist(ball.pos, mod);
                        if (d < mod.r && d > 5) {
                            const forceDir = vec.normalize(vec.sub(mod, ball.pos));
                            const pull = (1 - (d / mod.r)) * mod.strength;
                            ball.vel = vec.add(ball.vel, vec.mult(forceDir, pull));
                        }
                    }
                    if (mod.type === 'boost') {
                        if (vec.dist(ball.pos, mod) < mod.r) {
                            ball.vel = vec.add(ball.vel, vec.mult(mod.force, 0.15));
                            if (Math.random() < 0.3) {
                                particles.push({
                                    pos: vec.create(ball.pos.x + (Math.random()-0.5)*15, ball.pos.y + (Math.random()-0.5)*15),
                                    vel: vec.create((Math.random()-0.5)*2, -3),
                                    radius: Math.random()*3 + 1,
                                    color: '#00f0ff',
                                    alpha: 1,
                                    decay: 0.04
                                });
                            }
                        }
                    }
                });
            }

            // Perform integration step across mini steps for fidelity protection
            const subStepDt = 1 / PHYSICS.subSteps;
            
            for (let step = 0; step < PHYSICS.subSteps; step++) {
                // Apply positional advancement slice
                ball.pos.x += ball.vel.x * subStepDt;
                ball.pos.y += ball.vel.y * subStepDt;

                // Wall Collision Intersections
                for (let i = 0; i < activeWalls.length; i++) {
                    const wall = activeWalls[i];
                    const cp = getClosestPointOnSegment(ball.pos, wall.a, wall.b);
                    const dist = vec.dist(ball.pos, cp);

                    if (dist < ball.radius) {
                        // Correct overlapping displacement deflection
                        const collisionNormal = vec.normalize(vec.sub(ball.pos, cp));
                        
                        // Prevent zero length errors
                        if (collisionNormal.x === 0 && collisionNormal.y === 0) continue;

                        ball.pos = vec.add(cp, vec.mult(collisionNormal, ball.radius));

                        // Reflect velocity vector
                        ball.vel = vec.reflect(ball.vel, collisionNormal);
                        // Restitution bounce energy decay factor
                        ball.vel = vec.mult(ball.vel, 0.82); 
                        
                        createExplosion(cp, '#ffffff', 4, 0.4);
                    }
                }

                // Elastic Circle Bumpers Collisions
                if (level.modifiers) {
                    level.modifiers.forEach(mod => {
                        if (mod.type === 'bumper') {
                            const d = vec.dist(ball.pos, mod);
                            const minD = ball.radius + mod.r;
                            if (d < minD) {
                                const normal = vec.normalize(vec.sub(ball.pos, mod));
                                ball.pos = vec.add(mod, vec.mult(normal, minD));
                                ball.vel = vec.reflect(ball.vel, normal);
                                ball.vel = vec.mult(ball.vel, 1.4); // Energy ejection bounce amplification
                                mod.pulse = 1.0; // Trigger visualization ping
                                createExplosion(ball.pos, '#ff007f', 12, 1.2);
                            }
                        }
                    });
                }
            }

            // Apply global linear kinetic friction attenuation
            ball.vel = vec.mult(ball.vel, PHYSICS.friction);

            // Handle speed cutoff threshold limits
            if (vec.magSq(ball.vel) < PHYSICS.minSpeedStop ** 2) {
                ball.vel = vec.create(0, 0);
            }

            // Hazard Boundary Execution Intersect
            if (level.hazards) {
                level.hazards.forEach(haz => {
                    if (vec.dist(ball.pos, haz) < haz.r + ball.radius * 0.3) {
                        createExplosion(ball.pos, '#ff0055', 40, 1.5);
                        resetBallToSafe();
                    }
                });
            }

            // Goal Hole Target Interaction Processing
            const distToHole = vec.dist(ball.pos, level.hole);
            if (distToHole < PHYSICS.holeRadius) {
                if (distToHole < 6) {
                    // Lock down ball capture
                    ball.vel = vec.create(0, 0);
                    ball.pos = vec.create(level.hole.x, level.hole.y);
                    if (!ball.isSunk) {
                        ball.isSunk = true;
                        triggerHoleComplete();
                    }
                } else {
                    // Gravitational center drag emulation when rolling over hole cavity rim
                    const holePull = vec.normalize(vec.sub(level.hole, ball.pos));
                    ball.vel = vec.add(ball.vel, vec.mult(holePull, 0.38));
                }
            }
        }

        function resetBallToSafe() {
            const level = HOLES[currentHoleIndex];
            ball.pos = vec.create(level.start.x, level.start.y);
            ball.vel = vec.create(0, 0);
            ball.isSunk = false;
            ball.sinkScale = 1;
        }

        function isBallStationary() {
            return ball.vel.x === 0 && ball.vel.y === 0 && !ball.isSunk;
        }

        /**
         * System Navigation Workflow States
         */
        function startGame() {
            currentHoleIndex = 0;
            totalScoreRelativeToPar = 0;
            document.getElementById('start-screen').classList.remove('active');
            loadHole(currentHoleIndex);
        }

        function loadHole(index) {
            isTransitioning = false;
            strokeCount = 0;
            particles = [];
            
            const level = HOLES[index];
            ball.pos = vec.create(level.start.x, level.start.y);
            ball.vel = vec.create(0, 0);
            ball.isSunk = false;
            ball.sinkScale = 1;
            
            updateHUD();
            
            // Fade guidance instruction indicator toast visibility auto management
            const toast = document.getElementById('aim-guide-toast');
            if(index === 0) {
                toast.style.opacity = '1';
            } else {
                toast.style.opacity = '0';
            }
        }

        function updateHUD() {
            const level = HOLES[currentHoleIndex];
            document.getElementById('hud-hole').innerText = `${currentHoleIndex + 1}/${HOLES.length}`;
            document.getElementById('hud-par').innerText = level.par;
            document.getElementById('hud-strokes').innerText = strokeCount;
            
            const totalStr = totalScoreRelativeToPar === 0 ? "E" : (totalScoreRelativeToPar > 0 ? `+${totalScoreRelativeToPar}` : totalScoreRelativeToPar);
            document.getElementById('hud-total').innerText = totalStr;
        }

        function triggerHoleComplete() {
            if (isTransitioning) return;
            isTransitioning = true;
            
            createExplosion(ball.pos, '#39ff14', 60, 2);
            
            const level = HOLES[currentHoleIndex];
            const holeScore = strokeCount - level.par;
            totalScoreRelativeToPar += holeScore;

            // Compute score naming configuration terms
            let scoreTerm = "HOLE IN ONE!";
            if (strokeCount > 1) {
                if (holeScore === -3) scoreTerm = "ALBATROSS!";
                else if (holeScore === -2) scoreTerm = "EAGLE!";
                else if (holeScore === -1) scoreTerm = "BIRDIE";
                else if (holeScore === 0) scoreTerm = "PAR EXCELLENT";
                else if (holeScore === 1) scoreTerm = "BOGEY";
                else if (holeScore === 2) scoreTerm = "DOUBLE BOGEY";
                else scoreTerm = "HOLE COMPLETE";
            }

            setTimeout(() => {
                document.getElementById('score-title').innerText = scoreTerm;
                document.getElementById('score-subtitle').innerText = `Hole ${currentHoleIndex + 1} finalized`;
                document.getElementById('score-strokes').innerText = strokeCount;
                
                const totalStr = totalScoreRelativeToPar === 0 ? "E" : (totalScoreRelativeToPar > 0 ? `+${totalScoreRelativeToPar}` : totalScoreRelativeToPar);
                document.getElementById('score-total').innerText = totalStr;
                
                document.getElementById('score-screen').classList.add('active');
            }, 700);
        }

        function advanceCourse() {
            document.getElementById('score-screen').classList.remove('active');
            if (currentHoleIndex < HOLES.length - 1) {
                currentHoleIndex++;
                loadHole(currentHoleIndex);
            } else {
                // Game Over Course Victory Trigger
                document.getElementById('victory-final-score').innerText = totalScoreRelativeToPar === 0 ? "EVEN PAR" : (totalScoreRelativeToPar > 0 ? `+${totalScoreRelativeToPar}` : totalScoreRelativeToPar);
                
                let rating = "PRO GOLFER";
                if(totalScoreRelativeToPar <= -5) rating = "NEON DEITY";
                else if(totalScoreRelativeToPar < 0) rating = "VECTOR MASTER";
                else if(totalScoreRelativeToPar > 5) rating = "AMATEUR CIRUIT";
                
                document.getElementById('victory-rating').innerText = rating;
                document.getElementById('victory-screen').classList.add('active');
            }
        }

        /**
         * Touch Screen Event Routing (iPad & Safe-Input Optimized)
         */
        function getCanvasTouchLocation(e) {
            if (!e.touches || e.touches.length === 0) return null;
            
            // Extract accurate touch based on established input focus tracking lock
            let targetTouch = null;
            if (input.touchId !== null) {
                for(let i=0; i<e.touches.length; i++) {
                    if(e.touches[i].identifier === input.touchId) {
                        targetTouch = e.touches[i];
                        break;
                    }
                }
            }
            if(!targetTouch) targetTouch = e.touches[0];

            const rect = canvas.getBoundingClientRect();
            // Project structural screen coordinates back into uniform engine pixel space
            return vec.create(
                (targetTouch.clientX - rect.left) / scaleFactor,
                (targetTouch.clientY - rect.top) / scaleFactor
            );
        }

        function handlePointerDown(e) {
            if (!isBallStationary() || isTransitioning) return;

            // Target context identifier routing isolation setup
            if (e.touches && e.touches.length > 0 && input.touchId === null) {
                input.touchId = e.touches[0].identifier;
            }

            const pt = getCanvasTouchLocation(e);
            if (!pt) return;

            // Enforce responsive targeting radius anchor check around ball body locus
            const clickDistance = vec.dist(pt, ball.pos);
            if (clickDistance < 75) { // Highly forgiving interactive bounding box on iPad
                input.isAiming = true;
                input.startPos = vec.create(ball.pos.x, ball.pos.y);
                input.currentPos = vec.create(pt.x, pt.y);
                
                // Dim down hint banner element dynamically
                document.getElementById('aim-guide-toast').style.opacity = '0';
            }
        }

        function handlePointerMove(e) {
            if (!input.isAiming) return;
            e.preventDefault(); // Defend Safari layout elastic scrolling bounce actions

            const pt = getCanvasTouchLocation(e);
            if (!pt) return;

            input.currentPos = pt;
            // Vector calculation maps outward inversely from anchor ball node location point
            input.dragVector = vec.sub(input.startPos, input.currentPos);
            
            // Limit maximum force delivery vector length bounds parameters
            const dMag = vec.mag(input.dragVector);
            if (dMag * PHYSICS.aimScale > PHYSICS.maxPower) {
                const normalized = vec.normalize(input.dragVector);
                input.dragVector = vec.mult(normalized, PHYSICS.maxPower / PHYSICS.aimScale);
            }
        }

        function handlePointerUp(e) {
            if (!input.isAiming) return;
            
            // Verify structural multi-touch release integrity matches active cursor identification tracking slot
            if (e.touches && input.touchId !== null) {
                let stillActive = false;
                for(let i=0; i<e.touches.length; i++) {
                    if(e.touches[i].identifier === input.touchId) stillActive = true;
                }
                if(stillActive) return; // Retain active state tracking lock hold
            }

            input.isAiming = false;
            input.touchId = null;

            const finalPower = vec.mag(input.dragVector) * PHYSICS.aimScale;
            if (finalPower > 1.5) { // Dead-zone snap prevent misclick fires
                ball.vel = vec.mult(vec.normalize(input.dragVector), finalPower);
                strokeCount++;
                updateHUD();
            }
        }

        // Apply Native Pointer Interfaces binding safely to capture cross platforms
        canvas.addEventListener('touchstart', handlePointerDown, { passive: false });
        window.addEventListener('touchmove', handlePointerMove, { passive: false });
        window.addEventListener('touchend', handlePointerUp, { passive: false });
        window.addEventListener('touchcancel', handlePointerUp, { passive: false });

        // Backup desktop debug event structural mapping compatibility hooks
        canvas.addEventListener('mousedown', (e) => {
            const fakeEvent = { touches: [{ clientX: e.clientX, clientY: e.clientY, identifier: 999 }] };
            handlePointerDown(fakeEvent);
        });
        window.addEventListener('mousemove', (e) => {
            if(input.isAiming) {
                const fakeEvent = { touches: [{ clientX: e.clientX, clientY: e.clientY, identifier: 999 }], preventDefault: () => {} };
                handlePointerMove(fakeEvent);
            }
        });
        window.addEventListener('mouseup', () => {
            const fakeEvent = { touches: [] };
            handlePointerUp(fakeEvent);
        });

        /**
         * Visual Graphics Rendering Pipeline Architecture (Canvas Compositing Core)
         */
        function drawBackgroundGrid() {
            ctx.strokeStyle = '#121625';
            ctx.lineWidth = 1;
            const size = 50;
            for (let x = 0; x < BASE_W; x += size) {
                ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, BASE_H); ctx.stroke();
            }
            for (let y = 0; y < BASE_H; y += size) {
                ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(BASE_W, y); ctx.stroke();
            }
        }

        function drawWallLine(a, b, glowColor = '#00f0ff') {
            ctx.shadowBlur = 12;
            ctx.shadowColor = glowColor;
            ctx.strokeStyle = '#ffffff';
            ctx.lineWidth = 5;
            ctx.lineCap = 'round';
            
            ctx.beginPath();
            ctx.moveTo(a.x, a.y);
            ctx.lineTo(b.x, b.y);
            ctx.stroke();
            
            // Clean shadows reset structure loop
            ctx.shadowBlur = 0;
        }

        function renderSceneFrame() {
            // High-Performance clear cache buffers sequence
            ctx.fillStyle = '#06080e';
            ctx.fillRect(0, 0, BASE_W, BASE_H);

            drawBackgroundGrid();

            const level = HOLES[currentHoleIndex];

            // Render Field Environment Modifiers (Vortex Fields / Boost Zones)
            if (level.modifiers) {
                level.modifiers.forEach(mod => {
                    if (mod.type === 'vortex') {
                        ctx.save();
                        const time = Date.now() * 0.003;
                        ctx.translate(mod.x, mod.y);
                        ctx.rotate(time);
                        
                        let gradient = ctx.createRadialGradient(0,0, 10, 0,0, mod.r);
                        gradient.addColorStop(0, 'rgba(157, 0, 255, 0.4)');
                        gradient.addColorStop(0.5, 'rgba(157, 0, 255, 0.1)');
                        gradient.addColorStop(1, 'rgba(157, 0, 255, 0)');
                        ctx.fillStyle = gradient;
                        ctx.beginPath(); ctx.arc(0,0, mod.r, 0, Math.PI*2); ctx.fill();
                        
                        // Internal structural spiral vectors
                        ctx.strokeStyle = 'rgba(255, 0, 127, 0.3)';
                        ctx.lineWidth = 2;
                        ctx.beginPath();
                        for(let r=10; r < mod.r; r+=30) {
                            ctx.arc(0,0, r, 0, Math.PI/2);
                        }
                        ctx.stroke();
                        ctx.restore();
                    }
                    if (mod.type === 'boost') {
                        ctx.shadowBlur = 10;
                        ctx.shadowColor = '#00f0ff';
                        ctx.fillStyle = 'rgba(0, 240, 255, 0.06)';
                        ctx.strokeStyle = '#00f0ff';
                        ctx.lineWidth = 2;
                        ctx.beginPath(); ctx.arc(mod.x, mod.y, mod.r, 0, Math.PI*2); ctx.fill(); ctx.stroke();
                        ctx.shadowBlur = 0;

                        // Visual direction chevrons animation sequencing indicator loop
                        const offset = (Date.now() % 1000) / 1000 * 15;
                        ctx.strokeStyle = 'rgba(0, 240, 255, 0.6)';
                        ctx.lineWidth = 3;
                        ctx.lineCap = 'round';
                        for(let yOfs = -20; yOfs <= 20; yOfs += 15) {
                            ctx.beginPath();
                            ctx.moveTo(mod.x - 12, mod.y + yOfs + offset);
                            ctx.lineTo(mod.x, mod.y + yOfs - 8 + offset);
                            ctx.lineTo(mod.x + 12, mod.y + yOfs + offset);
                            ctx.stroke();
                        }
                    }
                    if (mod.type === 'bumper') {
                        const pulseScale = 1 + (mod.pulse * 0.25);
                        ctx.shadowBlur = 15 * pulseScale;
                        ctx.shadowColor = '#ff007f';
                        
                        // Linear fill coloring processing setup logic
                        ctx.fillStyle = mod.pulse > 0 ? `rgba(255, 0, 127, ${0.2 + mod.pulse*0.4})` : 'rgba(255, 0, 127, 0.15)';
                        ctx.strokeStyle = '#ff007f';
                        ctx.lineWidth = 3 + mod.pulse * 3;
                        
                        ctx.beginPath();
                        ctx.arc(mod.x, mod.y, mod.r * pulseScale, 0, Math.PI*2);
                        ctx.fill();
                        ctx.stroke();
                        ctx.shadowBlur = 0;
                    }
                });
            }

            // Render Hazard Areas (Vaporization Pools)
            if (level.hazards) {
                level.hazards.forEach(haz => {
                    const wave = Math.sin(Date.now() * 0.004 + haz.x) * 4;
                    ctx.fillStyle = 'rgba(255, 0, 85, 0.18)';
                    ctx.strokeStyle = '#ff0055';
                    ctx.lineWidth = 2;
                    ctx.shadowBlur = 12;
                    ctx.shadowColor = '#ff0055';
                    
                    ctx.beginPath();
                    ctx.arc(haz.x, haz.y, haz.r + wave, 0, Math.PI*2);
                    ctx.fill();
                    ctx.stroke();
                    ctx.shadowBlur = 0;
                    
                    // Core dynamic graphic signifier element detail
                    ctx.fillStyle = '#ff0055';
                    ctx.font = '900 12px sans-serif';
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.fillText('VOID', haz.x, haz.y);
                });
            }

            // Render Goal Target Hole Chamber
            ctx.fillStyle = '#000000';
            ctx.strokeStyle = 'rgba(57, 255, 20, 0.4)';
            ctx.lineWidth = 4;
            ctx.shadowBlur = 20;
            ctx.shadowColor = '#39ff14';
            ctx.beginPath();
            ctx.arc(level.hole.x, level.hole.y, PHYSICS.holeRadius, 0, Math.PI * 2);
            ctx.fill();
            ctx.stroke();
            ctx.shadowBlur = 0;

            // Target Aura Ring Decoration
            ctx.strokeStyle = '#39ff14';
            ctx.lineWidth = 1.5;
            ctx.setLineDash([4, 6]);
            ctx.beginPath();
            ctx.arc(level.hole.x, level.hole.y, PHYSICS.holeRadius + 12, 0, Math.PI * 2);
            ctx.stroke();
            ctx.setLineDash([]); // Reset line formatting configuration parameters

            // Render Map Static and Dynamic Obstacle Wall Arrays
            level.walls.forEach(w => drawWallLine(w.a, w.b, '#00f0ff'));
            if (level.modifiers) {
                level.modifiers.forEach(mod => {
                    if (mod.type === 'spinner' && mod.walls) {
                        mod.walls.forEach(w => drawWallLine(w.a, w.b, '#9d00ff'));
                    }
                });
            }

            // Render Interactive Trajectory Path Aim Line Projection Overlay
            if (input.isAiming && isBallStationary()) {
                const powerRatio = vec.mag(input.dragVector) * PHYSICS.aimScale / PHYSICS.maxPower;
                const aimDirection = vec.normalize(input.dragVector);
                
                // Draw vector line extension matching path target trajectory
                const endAimPoint = vec.add(ball.pos, vec.mult(aimDirection, powerRatio * 160));
                
                ctx.shadowBlur = 15;
                ctx.shadowColor = '#ff007f';
                ctx.strokeStyle = '#ff007f';
                ctx.lineWidth = 4;
                ctx.setLineDash([6, 4]);
                ctx.beginPath();
                ctx.moveTo(ball.pos.x, ball.pos.y);
                ctx.lineTo(endAimPoint.x, endAimPoint.y);
                ctx.stroke();
                ctx.setLineDash([]);
                
                // Power Indicator Ring End Node
                ctx.fillStyle = '#ffffff';
                ctx.beginPath();
                ctx.arc(endAimPoint.x, endAimPoint.y, 6 + powerRatio*4, 0, Math.PI*2);
                ctx.fill();
                ctx.shadowBlur = 0;
            }

            // Render Particle Spray Entities System
            particles.forEach(p => {
                ctx.save();
                ctx.globalAlpha = p.alpha;
                ctx.fillStyle = p.color;
                ctx.shadowBlur = 8;
                ctx.shadowColor = p.color;
                ctx.beginPath();
                ctx.arc(p.pos.x, p.pos.y, p.radius, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            });

            // Render Projectile Ball Asset Element Body Locus
            if (!ball.isSunk || ball.sinkScale > 0) {
                ctx.save();
                ctx.translate(ball.pos.x, ball.pos.y);
                
                if (ball.isSunk) {
                    ball.sinkScale -= 0.05; // Run animation scaling collapse
                    ctx.scale(Math.max(0, ball.sinkScale), Math.max(0, ball.sinkScale));
                }

                // Vector kinetic tracking tail illumination halo
                if (vec.magSq(ball.vel) > 2) {
                    ctx.shadowBlur = 10;
                    ctx.shadowColor = '#00f0ff';
                }

                // Outer core shell sphere design
                ctx.fillStyle = '#ffffff';
                ctx.beginPath();
                ctx.arc(0, 0, ball.radius, 0, Math.PI * 2);
                ctx.fill();

                // Structural Inner Core Graphic Accents
                ctx.fillStyle = '#0a0b10';
                ctx.beginPath();
                ctx.arc(-3, -3, 3, 0, Math.PI * 2);
                ctx.fill();

                ctx.restore();
                ctx.shadowBlur = 0;
            }
        }

        /**
         * Global Orchestration Loop Engine Frame Update Cycle execution management
         */
        function executeGameFrameIteration() {
            // Advance environmental step physics modeling loops logic
            updateLevelMechanics(HOLES[currentHoleIndex]);
            executePhysicsStep();
            updateParticles();

            // Project current system matrix scene layout out onto canvas interface workspace buffer
            ctx.save();
            ctx.scale(scaleFactor, scaleFactor);
            renderSceneFrame();
            ctx.restore();

            gameLoopId = requestAnimationFrame(executeGameFrameIteration);
        }

        /**
         * UI Bindings Wiring Hooks Setup Execution Matrix
         */
        document.getElementById('start-btn').addEventListener('click', () => {
            startGame();
            if(!gameLoopId) executeGameFrameIteration();
        });

        document.getElementById('next-btn').addEventListener('click', () => {
            advanceCourse();
        });

        document.getElementById('restart-btn').addEventListener('click', () => {
            document.getElementById('victory-screen').classList.remove('active');
            startGame();
        });

        document.getElementById('reset-btn').addEventListener('click', () => {
            if(!isTransitioning) {
                resetBallToSafe();
                strokeCount++; // Standard minor rule penalty application
                updateHUD();
            }
        });

        // Initialize display configuration matrices cleanly right away on frame load sequence
        resizeCanvas();
    </script>
</body>
