<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Prism Putt</title>
<style>
html,body{
margin:0;
overflow:hidden;
background:#081018;
touch-action:none;
font-family:system-ui,sans-serif;
height:100%;
}
canvas{
display:block;
width:100vw;
height:100vh;
}
#ui{
position:fixed;
inset:0;
pointer-events:none;
}
.panel{
position:absolute;
top:12px;
left:12px;
background:rgba(0,0,0,.28);
backdrop-filter:blur(8px);
border:1px solid rgba(255,255,255,.15);
color:white;
padding:10px 14px;
border-radius:16px;
font-size:14px;
}
#message{
position:absolute;
left:50%;
top:50%;
transform:translate(-50%,-50%);
color:white;
font-weight:700;
font-size:min(7vw,42px);
text-align:center;
text-shadow:0 0 20px #000;
opacity:0;
transition:.4s;
}
#message.show{
opacity:1;
}
#help{
position:absolute;
right:12px;
bottom:12px;
background:rgba(0,0,0,.25);
color:#d8e7ff;
padding:10px 14px;
border-radius:16px;
font-size:13px;
max-width:260px;
}
</style>
</head>
<body>
<canvas id="c"></canvas>

<div id="ui">
<div class="panel">
<div>Hole: <span id="hole">1</span>/9</div>
<div>Strokes: <span id="strokes">0</span></div>
<div>Total: <span id="total">0</span></div>
</div>

<div id="message"></div>

<div id="help">
Drag from the ball to aim and set power.<br>
Release to strike.<br>
Crystal gates bend the ball's momentum.
</div>
</div>

<script>
const canvas=document.getElementById("c");
const ctx=canvas.getContext("2d");
const holeEl=document.getElementById("hole");
const strokesEl=document.getElementById("strokes");
const totalEl=document.getElementById("total");
const msg=document.getElementById("message");

let W,H,SCALE;

function resize(){
W=canvas.width=innerWidth*devicePixelRatio;
H=canvas.height=innerHeight*devicePixelRatio;
canvas.style.width=innerWidth+"px";
canvas.style.height=innerHeight+"px";
SCALE=devicePixelRatio;
}
addEventListener("resize",resize);
resize();

function rand(a,b){return a+Math.random()*(b-a);}
function clamp(v,a,b){return Math.max(a,Math.min(b,v));}
function dist(ax,ay,bx,by){return Math.hypot(ax-bx,ay-by);}
function lerp(a,b,t){return a+(b-a)*t;}

const world={
w:1200,
h:700
};

let totalStrokes=0;
let holeIndex=0;

const holes=[];

function buildHoles(){

for(let i=0;i<9;i++){

const start={x:120,y:350};
const cup={x:1050,y:350};

const walls=[];

walls.push({x:0,y:0,w:1200,h:25});
walls.push({x:0,y:675,w:1200,h:25});
walls.push({x:0,y:0,w:25,h:700});
walls.push({x:1175,y:0,w:25,h:700});

const crystals=[];

if(i===0){
walls.push({x:430,y:160,w:50,h:380});
walls.push({x:720,y:0,w:50,h:500});
crystals.push({x:580,y:180,r:40,s:1});
}
else if(i===1){
for(let y=120;y<620;y+=120)
walls.push({x:300+(y%240),y,w:90,h:40});
crystals.push({x:620,y:350,r:55,s:-1});
crystals.push({x:880,y:220,r:35,s:1});
}
else if(i===2){
for(let x=220;x<980;x+=150){
walls.push({x,y:180,w:35,h:340});
}
crystals.push({x:600,y:350,r:90,s:1});
}
else if(i===3){
walls.push({x:240,y:140,w:700,h:35});
walls.push({x:240,y:525,w:700,h:35});
walls.push({x:570,y:175,w:35,h:350});
crystals.push({x:420,y:350,r:60,s:-1});
crystals.push({x:760,y:350,r:60,s:1});
}
else if(i===4){
for(let k=0;k<8;k++){
walls.push({x:240+k*110,y:(k%2?160:450),w:70,h:90});
}
crystals.push({x:600,y:350,r:80,s:1});
}
else if(i===5){
for(let k=0;k<5;k++){
walls.push({x:250+k*180,y:120+k*20,w:50,h:450-k*40});
}
crystals.push({x:980,y:350,r:70,s:-1});
}
else if(i===6){
for(let a=0;a<10;a++){
walls.push({x:260+a*80,y:120+(a%2)*250,w:45,h:180});
}
crystals.push({x:470,y:350,r:50,s:1});
crystals.push({x:760,y:350,r:50,s:-1});
}
else if(i===7){
walls.push({x:250,y:140,w:700,h:40});
walls.push({x:250,y:520,w:700,h:40});
for(let n=0;n<5;n++){
walls.push({x:350+n*120,y:250,w:60,h:200});
}
crystals.push({x:1020,y:350,r:75,s:1});
}
else{
for(let n=0;n<14;n++){
walls.push({
x:220+n*65,
y:150+Math.sin(n)*180,
w:40,
h:180
});
}
crystals.push({x:550,y:260,r:60,s:1});
crystals.push({x:850,y:440,r:60,s:-1});
}
holes.push({start,cup,walls,crystals});
}
}
buildHoles();

const ball={
x:0,y:0,vx:0,vy:0,r:14
};

let current;
let strokes=0;
let won=false;

function loadHole(i){
current=holes[i];
ball.x=current.start.x;
ball.y=current.start.y;
ball.vx=0;
ball.vy=0;
strokes=0;
holeEl.textContent=i+1;
strokesEl.textContent=0;
totalEl.textContent=totalStrokes;
}

loadHole(0);

function flash(t){
msg.textContent=t;
msg.classList.add("show");
setTimeout(()=>msg.classList.remove("show"),1600);
}

let aiming=false;
let dragX=0;
let dragY=0;

function screenToWorld(x,y){
const scale=Math.min(W/world.w,H/world.h);
const ox=(W-world.w*scale)/2;
const oy=(H-world.h*scale)/2;
return {
x:(x*SCALE-ox)/scale,
y:(y*SCALE-oy)/scale
};
}

function down(e){
const p=e.touches?e.touches[0]:e;
const w=screenToWorld(p.clientX,p.clientY);

if(Math.hypot(w.x-ball.x,w.y-ball.y)<55 &&
Math.hypot(ball.vx,ball.vy)<0.3){
aiming=true;
dragX=w.x;
dragY=w.y;
}
}
function move(e){
if(!aiming)return;
const p=e.touches?e.touches[0]:e;
const w=screenToWorld(p.clientX,p.clientY);
dragX=w.x;
dragY=w.y;
}
function up(){
if(!aiming)return;
aiming=false;

const dx=ball.x-dragX;
const dy=ball.y-dragY;
const power=clamp(Math.hypot(dx,dy),0,180);

if(power>8){
ball.vx=dx*0.095;
ball.vy=dy*0.095;
strokes++;
totalStrokes++;
strokesEl.textContent=strokes;
totalEl.textContent=totalStrokes;
}
}

canvas.addEventListener("mousedown",down);
canvas.addEventListener("mousemove",move);
addEventListener("mouseup",up);

canvas.addEventListener("touchstart",down,{passive:false});
canvas.addEventListener("touchmove",move,{passive:false});
canvas.addEventListener("touchend",up);

function circleRect(cx,cy,r,rect){

const nx=clamp(cx,rect.x,rect.x+rect.w);
const ny=clamp(cy,rect.y,rect.y+rect.h);
const dx=cx-nx;
const dy=cy-ny;
const d2=dx*dx+dy*dy;

if(d2<r*r){
const d=Math.sqrt(d2)||0.001;
return{
hit:true,
nx:dx/d,
ny:dy/d,
depth:r-d
};
}
return null;
}

let particles=[];

function burst(x,y,c,n=16){
for(let i=0;i<n;i++){
particles.push({
x,y,
vx:rand(-4,4),
vy:rand(-4,4),
a:1,
c
});
}
}

function nextHole(){
holeIndex++;
if(holeIndex>=holes.length){
flash("Course Complete");
holeIndex=0;
totalStrokes=0;
}
loadHole(holeIndex);
}

function update(){

ball.x+=ball.vx;
ball.y+=ball.vy;

ball.vx*=0.991;
ball.vy*=0.991;

if(Math.hypot(ball.vx,ball.vy)<0.03){
ball.vx=0;
ball.vy=0;
}

for(const w of current.walls){
const hit=circleRect(ball.x,ball.y,ball.r,w);
if(hit){
ball.x+=hit.nx*hit.depth;
ball.y+=hit.ny*hit.depth;

const dot=ball.vx*hit.nx+ball.vy*hit.ny;
ball.vx-=2*dot*hit.nx;
ball.vy-=2*dot*hit.ny;
ball.vx*=0.92;
ball.vy*=0.92;
}
}

for(const c of current.crystals){
const dx=ball.x-c.x;
const dy=ball.y-c.y;
const d=Math.hypot(dx,dy);

if(d<c.r+60){
const force=(1-d/(c.r+60))*0.18*c.s;
ball.vx+=(-dy/d)*force;
ball.vy+=(dx/d)*force;
    }

if(d<c.r+ball.r){
const nx=dx/(d||1);
const ny=dy/(d||1);

ball.x=c.x+nx*(c.r+ball.r);
ball.y=c.y+ny*(c.r+ball.r);

const dot=ball.vx*nx+ball.vy*ny;
ball.vx-=2*dot*nx;
ball.vy-=2*dot*ny;

burst(ball.x,ball.y,c.s>0?"#6ff":"#f6f",6);
}
}

const cup=current.cup;
const cd=dist(ball.x,ball.y,cup.x,cup.y);

if(cd<55){
const pull=(55-cd)*0.002;
ball.vx+=(cup.x-ball.x)*pull;
ball.vy+=(cup.y-ball.y)*pull;
}

if(cd<18 && Math.hypot(ball.vx,ball.vy)<1.6 && !won){
won=true;
burst(cup.x,cup.y,"#fff",50);

setTimeout(()=>{
flash("Hole "+(holeIndex+1)+" Complete");
won=false;
nextHole();
},800);
}

for(let i=particles.length-1;i>=0;i--){
const p=particles[i];
p.x+=p.vx;
p.y+=p.vy;
p.vx*=0.98;
p.vy*=0.98;
p.a-=0.02;
if(p.a<=0)particles.splice(i,1);
}
}

function draw(){

ctx.clearRect(0,0,W,H);

const scale=Math.min(W/world.w,H/world.h);
const ox=(W-world.w*scale)/2;
const oy=(H-world.h*scale)/2;

ctx.save();
ctx.translate(ox,oy);
ctx.scale(scale,scale);

const grad=ctx.createLinearGradient(0,0,1200,700);
grad.addColorStop(0,"#0d3f3d");
grad.addColorStop(1,"#0d243f");
ctx.fillStyle=grad;
ctx.fillRect(0,0,1200,700);

for(let y=0;y<700;y+=40){
ctx.strokeStyle="rgba(255,255,255,.03)";
ctx.beginPath();
ctx.moveTo(0,y);
ctx.lineTo(1200,y);
ctx.stroke();
}

for(const w of current.walls){
ctx.fillStyle="#24303c";
ctx.fillRect(w.x,w.y,w.w,w.h);

ctx.fillStyle="rgba(255,255,255,.05)";
ctx.fillRect(w.x,w.y,w.w,4);
}

for(const c of current.crystals){

const g=ctx.createRadialGradient(c.x,c.y,5,c.x,c.y,c.r);
g.addColorStop(0,c.s>0?"#9ff":"#f9f");
g.addColorStop(1,c.s>0?"#0088aa":"#aa0088");

ctx.fillStyle=g;
ctx.beginPath();
ctx.arc(c.x,c.y,c.r,0,Math.PI*2);
ctx.fill();

ctx.strokeStyle="rgba(255,255,255,.4)";
ctx.lineWidth=2;
ctx.stroke();
}

const cup=current.cup;

ctx.fillStyle="#000";
ctx.beginPath();
ctx.arc(cup.x,cup.y,18,0,Math.PI*2);
ctx.fill();

ctx.strokeStyle="#fff";
ctx.lineWidth=3;
ctx.beginPath();
ctx.moveTo(cup.x,cup.y);
ctx.lineTo(cup.x,cup.y-70);
ctx.stroke();

ctx.fillStyle="#ffd84a";
ctx.beginPath();
ctx.moveTo(cup.x,cup.y-70);
ctx.lineTo(cup.x+38,cup.y-58);
ctx.lineTo(cup.x,cup.y-46);
ctx.fill();

for(const p of particles){
ctx.globalAlpha=p.a;
ctx.fillStyle=p.c;
ctx.beginPath();
ctx.arc(p.x,p.y,3,0,Math.PI*2);
ctx.fill();
}
ctx.globalAlpha=1;

const bg=ctx.createRadialGradient(
ball.x-5,ball.y-5,2,
ball.x,ball.y,ball.r*1.8
);
bg.addColorStop(0,"#fff");
bg.addColorStop(1,"#cfd8e5");

ctx.fillStyle=bg;
ctx.beginPath();
ctx.arc(ball.x,ball.y,ball.r,0,Math.PI*2);
ctx.fill();

if(aiming){
const dx=ball.x-dragX;
const dy=ball.y-dragY;
const len=clamp(Math.hypot(dx,dy),0,180);

ctx.strokeStyle="rgba(255,255,255,.8)";
ctx.lineWidth=3;
ctx.setLineDash([8,8]);
ctx.beginPath();
ctx.moveTo(ball.x,ball.y);
ctx.lineTo(ball.x+dx/Math.max(1,len)*len,
ball.y+dy/Math.max(1,len)*len);
ctx.stroke();
ctx.setLineDash([]);

ctx.beginPath();
ctx.arc(dragX,dragY,22,0,Math.PI*2);
ctx.strokeStyle="rgba(255,255,255,.3)";
ctx.stroke();
}

ctx.restore();
}

function loop(){
update();
draw();
requestAnimationFrame(loop);
}
loop();
</script>
</body>
</html>
